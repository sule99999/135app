// ── DASHBOARD ────────────────────────────────────────
function Dashboard({plan,onUpdate,onAddTask,onDeleteTask}){
  const [activeId,setActiveId]=useState(null);
  const [editTask,setEditTask]=useState(null);
  const [showAddTask,setShowAddTask]=useState(false);
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const [showGoldComplete,setShowGoldComplete]=useState(false);
  const all=planTasks(plan);
  const activeTask=activeId?all.find(t=>t.id===activeId):null;
  const done=all.filter(t=>t.status==='completed').length;

  const start=t=>{
    if(t.status==='completed') return;
    // Check-in task: complete immediately, no timer
    if(t.isCheckIn){
      onUpdate({...t,status:'completed',actualMinutes:0,completedAt:new Date().toISOString()});
      if(t.tier==='gold') setShowGoldComplete(true);
      return;
    }
    if(t.status==='idle'){
      // First ever start: record wall-clock start time
      const updated={...t, timerStartedAt:new Date().toISOString()};
      onUpdate(updated);
    }
    // If paused: just reopen timer — keep original timerStartedAt
    setActiveId(t.id);
  };
  const complete=t=>{ onUpdate(t); setActiveId(null); if(t.tier==='gold') setShowGoldComplete(true); };
  const pause=(t, remaining)=>{
    // Save remaining seconds so the timer can resume from where it left off
    onUpdate({...t, status:'paused', remainingSeconds: remaining});
    setActiveId(null);
  };
  const handleSaveEdit=t=>{ onUpdate(t); setEditTask(null); };
  const handleAddTask=t=>{ onAddTask(t); setShowAddTask(false); };
  const handleDeleteReq=t=>setDeleteConfirm(t);
  const confirmDelete=()=>{ if(deleteConfirm){ onDeleteTask(deleteConfirm); setDeleteConfirm(null); } };
  // 撤销完成：恢复为 idle，清除完成数据
  const undoComplete=t=>onUpdate({...t,status:'idle',completedAt:null,actualMinutes:null,remainingSeconds:null});

  const Sec=({tier,items})=>{
    const dc=items.filter(t=>t.status==='completed').length;
    const label=tier==='gold'?'今日必做':tier==='silver'?'重要任务':'待办事项';
    const icon=tier==='gold'?'🥇':tier==='silver'?'🥈':'🥉';
    // 未完成任务在前，已完成任务沉底
    const sorted=[...items].sort((a,b)=>(a.status==='completed'?1:0)-(b.status==='completed'?1:0));
    return(
      <div className={`dash-section section-${tier}`}>
        <div className="section-header">
          <span style={{fontSize:18}}>{icon}</span>
          <span className="section-label">{label}</span>
          <span className="section-count">{dc}/{items.length}</span>
        </div>
        {sorted.map(t=>(<TaskCard key={t.id} task={t} locked={!!activeId&&activeId!==t.id} onStart={start} onEdit={setEditTask} onDelete={handleDeleteReq} onUndoComplete={undoComplete} onQuickSave={onUpdate}/>))}
      </div>
    );
  };

  return(
    <div className="content-pad">
      {/* 1·3·5 权重进度条 */}
      <div className="tier-prog-bar">
        {plan.goldTask&&(
          <div className="tier-prog-group">
            <span style={{fontSize:16,marginRight:2}}>🥇</span>
            <span className={`tier-prog-pip${plan.goldTask.status==='completed'?' pip-done':''}`}>
              {plan.goldTask.status==='completed'?'✔':'○'}
            </span>
            {plan.goldTask.status==='completed'&&<span className="tier-prog-badge">已获得</span>}
          </div>
        )}
        {plan.silverTasks.length>0&&(
          <div className="tier-prog-group">
            <span style={{fontSize:16,marginRight:2}}>🥈</span>
            {plan.silverTasks.map((t,i)=>(
              <span key={i} className={`tier-prog-pip${t.status==='completed'?' pip-done':''}`}>{t.status==='completed'?'✔':'○'}</span>
            ))}
            {plan.silverTasks.length>0&&plan.silverTasks.every(t=>t.status==='completed')&&<span className="tier-prog-badge">已获得</span>}
          </div>
        )}
        {plan.bronzeTasks.length>0&&(
          <div className="tier-prog-group">
            <span style={{fontSize:16,marginRight:2}}>🥉</span>
            {plan.bronzeTasks.map((t,i)=>(
              <span key={i} className={`tier-prog-pip${t.status==='completed'?' pip-done':''}`}>{t.status==='completed'?'✔':'○'}</span>
            ))}
            {plan.bronzeTasks.length>0&&plan.bronzeTasks.every(t=>t.status==='completed')&&<span className="tier-prog-badge">已获得</span>}
          </div>
        )}
        <div style={{marginLeft:'auto',fontSize:11,color:'var(--text-secondary)',fontWeight:600}}>{done}/{all.length}</div>
      </div>
      {plan.goldTask&&<Sec tier="gold"   items={[plan.goldTask]}/>}
      {plan.silverTasks.length>0&&<Sec tier="silver" items={plan.silverTasks}/>}
      {plan.bronzeTasks.length>0&&<Sec tier="bronze" items={plan.bronzeTasks}/>}
      {done===all.length&&all.length>0&&(
        <div className="all-done-banner">
          <div style={{fontSize:44,marginBottom:8}}>🏆</div>
          <div style={{fontSize:19,fontWeight:800,color:'var(--gold)',marginBottom:5}}>今日任务全部完成！</div>
          <div style={{fontSize:12,color:'var(--text-secondary)'}}>太棒了，明天继续保持！</div>
        </div>
      )}
      <button className="add-task-btn" onClick={()=>setShowAddTask(true)}>➕ 新增任务</button>
      {showGoldComplete&&<GoldCompleteModal onClose={()=>setShowGoldComplete(false)}/>}
      {activeTask&&<PomodoroTimer task={activeTask} onComplete={complete} onPause={pause}/>}
      {editTask&&<EditTaskModal task={editTask} onSave={handleSaveEdit} onClose={()=>setEditTask(null)}/>}
      {showAddTask&&<AddTaskModal onSave={handleAddTask} onClose={()=>setShowAddTask(false)} plan={plan}/>}
      {deleteConfirm&&(
        <div className="overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="dialog-box" onClick={e=>e.stopPropagation()}>
            <div className="dialog-emoji">🗑️</div>
            <div className="dialog-title">删除任务</div>
            <div className="dialog-sub">确定删除「{deleteConfirm.title}」？<br/>此操作无法撤销。</div>
            <div className="dialog-row">
              <button className="dialog-btn" style={{background:'rgba(255,82,82,0.15)',color:'var(--danger)',border:'1px solid rgba(255,82,82,0.3)'}} onClick={confirmDelete}>🗑️ 删除</button>
              <button className="dialog-btn dialog-no" onClick={()=>setDeleteConfirm(null)}>取消</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── DATA REVIEW ──────────────────────────────────────
function DataReview({plans}){
  const [tab,setTab]=useState('overview');
  const days=useMemo(()=>Object.keys(plans).sort(),[plans]);
  const allT=useMemo(()=>days.flatMap(d=>planTasks(plans[d])),[days,plans]);
  const doneT=useMemo(()=>allT.filter(t=>t.status==='completed'),[allT]);
  const streak=useMemo(()=>calcStreak(plans),[plans]);
  const mxStrk=useMemo(()=>calcMaxStreak(plans),[plans]);
  const stats=useMemo(()=>({
    active:days.length, totalDone:doneT.length,
    goldDone:doneT.filter(t=>t.tier==='gold').length,
    silverFull:days.filter(d=>{ const p=plans[d]; return p&&p.silverTasks.length>0&&p.silverTasks.every(t=>t.status==='completed'); }).length,
    perfect:days.filter(d=>{ const p=plans[d]; if(!p) return false; const a=planTasks(p); return a.length>0&&a.every(t=>t.status==='completed'); }).length,
    maxStreak:mxStrk,
    onTime:doneT.filter(t=>t.actualMinutes&&t.actualMinutes<=t.estimatedMinutes).length,
    early: doneT.filter(t=>t.actualMinutes&&t.actualMinutes<t.estimatedMinutes*0.9).length,
  }),[days,plans,doneT,mxStrk]);

  const HeatMap=()=>{
    const cells=[]; const now=new Date();
    for(let i=69;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().split('T')[0],p=plans[k];const n=p?planTasks(p).filter(t=>t.status==='completed').length:0;const lvl=n>=9?4:n>=6?3:n>=3?2:n>=1?1:0;cells.push({k,lvl});}
    return(<div className="review-card"><div className="review-card-title">📅 活跃热力图（近70天）</div>
      <div className="heatmap">{cells.map((c,i)=><div key={i} className={`hm-cell${c.lvl>0?` hm-${c.lvl}`:''}`} title={c.k}/>)}</div>
      <div className="hm-legend"><span>少</span>{[0,1,2,3,4].map(l=><div key={l} className="hm-sw" style={{background:l===0?'var(--chip-bg)':`rgba(200,144,10,${l*.2+.1})`}}/>)}<span>多</span></div>
    </div>);
  };

  const BarChart=()=>{
    const rows=[]; const now=new Date();
    for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().split('T')[0],p=plans[k],ts=p?planTasks(p):[];
      const pl=ts.reduce((s,t)=>s+(t.estimatedMinutes||0),0),ac=ts.filter(t=>t.status==='completed').reduce((s,t)=>s+(t.actualMinutes||0),0);
      rows.push({lbl:`周${'日一二三四五六'[d.getDay()]}`,plan:pl,act:ac});}
    const mx=Math.max(...rows.flatMap(r=>[r.plan,r.act]),60);
    return(<div className="review-card"><div className="review-card-title">📊 近7天时间对比（分钟）</div>
      <div className="bar-chart-wrap">{rows.map((r,i)=>(<div key={i} className="bar-grp"><div className="bar bar-plan" style={{height:`${(r.plan/mx)*70}px`}}/><div className="bar bar-act" style={{height:`${(r.act/mx)*70}px`}}/><span className="bar-lbl">{r.lbl}</span></div>))}</div>
      <div className="chart-legend"><span><span className="legend-sw" style={{background:'var(--gold-bg)',border:'1px solid var(--gold-border)'}}/>计划</span><span><span className="legend-sw" style={{background:'var(--gold)',opacity:.85}}/>实际</span></div>
    </div>);
  };

  const WeeklySummary=()=>{
    const wks={}; days.forEach(d=>{ const w=weekOf(d); if(!wks[w])wks[w]=[]; wks[w].push(d); });
    const list=Object.entries(wks).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,10);
    if(!list.length) return(<div className="empty-state"><div className="empty-icon">📊</div><div className="empty-title">暂无数据</div><div className="empty-text">完成一周记录后，这里将显示每周总结</div></div>);
    return(<div className="review-card"><div className="review-card-title">📅 每周总结</div>
      <table className="sum-table"><thead><tr><th>周起始</th><th>活跃</th><th>完成</th><th>完成率</th></tr></thead>
      <tbody>{list.map(([w,ds])=>{const ts=ds.flatMap(d=>planTasks(plans[d]));const dn=ts.filter(t=>t.status==='completed').length;const rate=ts.length?Math.round(dn/ts.length*100):0;const x=new Date(w+' 12:00');return(<tr key={w}><td style={{color:'var(--gold)'}}>{x.getMonth()+1}/{x.getDate()}</td><td>{ds.length}天</td><td>{dn}/{ts.length}</td><td><span style={{color:rate>=80?'var(--success)':rate>=50?'var(--gold)':'var(--danger)'}}>{rate}%</span></td></tr>);})}</tbody>
      </table></div>);
  };

  const MonthlySummary=()=>{
    const mths={}; days.forEach(d=>{ const m=d.slice(0,7); if(!mths[m])mths[m]=[]; mths[m].push(d); });
    const list=Object.entries(mths).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12);
    if(!list.length) return(<div className="empty-state"><div className="empty-icon">📅</div><div className="empty-title">暂无数据</div><div className="empty-text">使用满一个月后，这里将显示月度总结</div></div>);
    return(<div className="review-card"><div className="review-card-title">🗓️ 月度总结</div>
      <table className="sum-table"><thead><tr><th>月份</th><th>活跃</th><th>完成</th><th>金牌率</th><th>准时率</th></tr></thead>
      <tbody>{list.map(([m,ds])=>{const ts=ds.flatMap(d=>planTasks(plans[d]));const dn=ts.filter(t=>t.status==='completed');const gl=ts.filter(t=>t.tier==='gold').length;const gr=gl?Math.round(dn.filter(t=>t.tier==='gold').length/gl*100):0;const otr=dn.length?Math.round(dn.filter(t=>t.actualMinutes&&t.actualMinutes<=t.estimatedMinutes).length/dn.length*100):0;const[y,mo]=m.split('-');return(<tr key={m}><td style={{color:'var(--gold)'}}>{y}年{parseInt(mo)}月</td><td>{ds.length}天</td><td>{dn.length}</td><td><span style={{color:gr>=80?'var(--success)':'var(--gold)'}}>{gr}%</span></td><td><span style={{color:otr>=70?'var(--success)':'var(--danger)'}}>{otr}%</span></td></tr>);})}</tbody>
      </table></div>);
  };

  const Badges=()=>(<div className="review-card"><div className="review-card-title">🏅 成就勋章墙</div>
    <div className="badge-grid">{BADGES.map(b=>{const on=b.check(stats);return(<div key={b.id} className="badge-tile"><div className={`badge-icon ${on?'badge-unlocked':'badge-locked'}`}>{b.emoji}</div><div className="badge-name">{b.name}</div></div>);})}</div>
  </div>);

  return(<div className="review-wrap">
    <div className="review-top"><h2>📊 数据复盘</h2><p>了解你的时间都去哪了</p></div>
    <div className="review-tabs">{[{id:'overview',l:'概览'},{id:'weekly',l:'每周'},{id:'monthly',l:'每月'},{id:'badges',l:'勋章'}].map(t=>(<button key={t.id} className={`rtab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.l}</button>))}</div>
    {tab==='overview'&&(<><div className="stats-grid">
      <div className="stat-tile"><span className="stat-val" style={{color:'#FF9500'}}>{streak}</span><div className="stat-lbl">🔥 连续打卡</div></div>
      <div className="stat-tile"><span className="stat-val" style={{color:'var(--gold)'}}>{stats.totalDone}</span><div className="stat-lbl">✅ 累计完成</div></div>
      <div className="stat-tile"><span className="stat-val" style={{color:'var(--success)'}}>{stats.perfect}</span><div className="stat-lbl">🌟 完美天数</div></div>
    </div><div className="stats-grid">
      <div className="stat-tile"><span className="stat-val" style={{color:'var(--gold)'}}>{stats.goldDone}</span><div className="stat-lbl">🥇 金牌完成</div></div>
      <div className="stat-tile"><span className="stat-val" style={{color:'var(--silver)'}}>{stats.onTime}</span><div className="stat-lbl">⏰ 准时完成</div></div>
      <div className="stat-tile"><span className="stat-val" style={{color:'var(--success)'}}>{stats.early}</span><div className="stat-lbl">🚀 提前完成</div></div>
    </div><HeatMap/><BarChart/></>)}
    {tab==='weekly' &&<WeeklySummary/>}{tab==='monthly'&&<MonthlySummary/>}{tab==='badges'&&<Badges/>}
  </div>);
}

// ── ADD EVENT MODAL ──────────────────────────────────
function AddEventModal({initialDate, onSave, onClose}){

  const save=()=>{
    if(!title.trim()) return;
    onSave({id:genId(),title:title.trim(),date,allDay,startTime:allDay?null:startT,endTime:allDay?null:endT,color,notes:notes.trim()||null});

  return(<div className="overlay" onClick={onClose}>
    <div className="modal-box modal-welcome" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>

      </div>
      <div className="form-group"><label className="form-label">日期</label>

      </div>

      <div className="form-group" style={{display:'flex',alignItems:'center',gap:10}}>
        <label style={{fontSize:13,color:'var(--text-primary)',cursor:'pointer',display:'flex',alignItems:'center',gap:6,userSelect:'none'}}>

        </label>
      </div>

      {!allDay&&(<div className="form-group"><label className="form-label">时间段</label>
        <div className="time-row">
          <input className="form-input form-input-sm" type="time" value={startT} onChange={e=>setStartT(e.target.value)} style={{flex:1}}/>
          <span>至</span>
          <input className="form-input form-input-sm" type="time" value={endT} onChange={e=>setEndT(e.target.value)} style={{flex:1}}/>
        </div>
      </div>)}

      <div className="form-group"><label className="form-label">颜色</label>
        <div className="color-picker">
          {Object.entries(EVENT_COLORS).map(([k,c])=>(
            <div key={k} className={`color-dot${color===k?' selected':''}`}
              style={{background:c.hex}} title={COLOR_LABELS[k]}
              onClick={()=>setColor(k)}/>
          ))}
        </div>
      </div>
      <div className="form-group"><label className="form-label">备注（可选）</label>
        <input className="form-input form-input-sm" placeholder="备注…" value={notes} onChange={e=>setNotes(e.target.value)}/>
      </div>

      <button className="btn btn-gold" disabled={!title.trim()} onClick={save}>保存事件</button>
      <button className="btn btn-ghost" onClick={onClose}>取消</button>
    </div>
  </div>);
}

// ── CALENDAR VIEW ────────────────────────────────────
function CalendarView({plans, events, onAddEvent, onDeleteEvent}){
  const [view,setView]=useState('month');
  const [curYear,setCurYear]=useState(new Date().getFullYear());
  const [curMonth,setCurMonth]=useState(new Date().getMonth());
  const [selDate,setSelDate]=useState(todayStr());
  const [showAdd,setShowAdd]=useState(false);

  const today=todayStr();

  // Navigate months
  const prevMonth=()=>{ if(curMonth===0){setCurYear(y=>y-1);setCurMonth(11);}else setCurMonth(m=>m-1); };
  const nextMonth=()=>{ if(curMonth===11){setCurYear(y=>y+1);setCurMonth(0);}else setCurMonth(m=>m+1); };
  const goToday=()=>{ const n=new Date(); setCurYear(n.getFullYear()); setCurMonth(n.getMonth()); setSelDate(todayStr()); };

  // Navigate days (in day view)
  const shiftDay=(delta)=>{
    const d=new Date(selDate+'T12:00:00');
    d.setDate(d.getDate()+delta);
    setSelDate(d.toISOString().split('T')[0]);
  };

  // Build month grid
  const monthGrid=useMemo(()=>{
    const firstDay=new Date(curYear,curMonth,1).getDay();
    const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
    const startOffset=firstDay===0?6:firstDay-1; // Monday start
    const cells=[];
    // Previous month days
    const prevDays=new Date(curYear,curMonth,0).getDate();
    for(let i=startOffset-1;i>=0;i--){
      const d=new Date(curYear,curMonth-1,prevDays-i);
      cells.push({date:d.toISOString().split('T')[0],inMonth:false});
    }
    // Current month
    for(let d=1;d<=daysInMonth;d++){
      const dt=new Date(curYear,curMonth,d);
      cells.push({date:dt.toISOString().split('T')[0],inMonth:true});
    }
    // Next month fill
    while(cells.length%7!==0){
      const d=new Date(curYear,curMonth+1,cells.length-daysInMonth-startOffset+1);
      cells.push({date:d.toISOString().split('T')[0],inMonth:false});
    }
    return cells;
  },[curYear,curMonth]);

  const MONTH_NAMES=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const DAY_LABELS=['一','二','三','四','五','六','日'];

  // Timeline for selected date
  const timelineEvts=useMemo(()=>getTimelineEvents(selDate,plans,events),[selDate,plans,events]);
  const alldayEvts=timelineEvts.filter(e=>e.allDay);
  const timedEvts=timelineEvts.filter(e=>!e.allDay);

  // Compute event positions (simple, no overlap detection)
  const HOUR_H=56;
  const evtBlocks=timedEvts.map(e=>{
    const startMin=e.startH*60+e.startM;
    const endMin=e.endH*60+e.endM;
    const dur=Math.max(endMin-startMin,20);
    return {...e, top:startMin*(HOUR_H/60), height:Math.max(dur*(HOUR_H/60),24)};
  });

  const MonthView=()=>(
    <div>
      <div className="cal-month-header">
        <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
        <div className="cal-month-title">{curYear}年 {MONTH_NAMES[curMonth]}</div>
        <button className="cal-today-btn" onClick={goToday}>今天</button>
        <button className="cal-nav-btn" onClick={nextMonth}>›</button>
      </div>
      <div className="cal-days-row">
        {DAY_LABELS.map(d=>(<div key={d} className="cal-day-label">{d}</div>))}
      </div>
      <div className="cal-grid">
        {monthGrid.map(cell=>{
          const dots=getDayDots(cell.date,plans,events);
          const isToday=cell.date===today;
          const isSel=cell.date===selDate;
          return(
            <div key={cell.date} className={`cal-cell${!cell.inMonth?' other-month':''}${isToday?' today':''}${isSel?' selected':''}`}
              onClick={()=>{setSelDate(cell.date);setView('day');}}>
              <div className="cal-date-num">
                {parseInt(cell.date.split('-')[2])}
              </div>
              {dots.length>0&&(
                <div className="cal-dots">
                  {dots.map((c,i)=>(<div key={i} className={`cal-dot ec-${c}`}/>))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );

  const DayView=()=>{
    const fmtHour=h=>h===0?'0:00':h<10?`${h}:00`:`${h}:00`;
    // Scroll to first event or 8am
    const scrollRef=useRef(null);
    useEffect(()=>{
      if(scrollRef.current){
        const firstEvt=timedEvts.length>0?Math.min(...timedEvts.map(e=>e.startH)):8;
        const scrollTo=Math.max(0,(firstEvt-1)*HOUR_H);
        scrollRef.current.scrollTop=scrollTo;
      }
    },[selDate]);

    return(
      <div>
        <div className="cal-day-header">
          <button className="cal-back-btn" onClick={()=>setView('month')}>‹ 月历</button>
          <div style={{display:'flex',alignItems:'center',gap:4,flex:1,justifyContent:'center'}}>
            <button className="cal-nav-btn" style={{fontSize:18}} onClick={()=>shiftDay(-1)}>‹</button>
            <div className="cal-day-title" style={{minWidth:100,textAlign:'center'}}>{fmtDateShort(selDate)}{selDate===today?' · 今天':''}</div>
            <button className="cal-nav-btn" style={{fontSize:18}} onClick={()=>shiftDay(1)}>›</button>
          </div>
          <button className="cal-add-btn" onClick={()=>setShowAdd(true)}>+ 添加</button>
        </div>

        {/* All-day events */}
        {alldayEvts.length>0&&(
          <div className="allday-strip">
            {alldayEvts.map(e=>(
              <div key={e.id} className="allday-chip" style={{background:getEvtColor(e.colorKey)}}
                onClick={()=>{if(!e.isTask&&confirm(`删除"${e.title}"?`)) onDeleteEvent(e.id);}}>
                {e.title}
              </div>
            ))}
          </div>
        )}

        {/* Timeline */}
        <div className="timeline-scroll" ref={scrollRef} style={{height:'calc(100vh - 240px)',overflowY:'auto'}}>
          <div className="timeline-inner" style={{height:`${24*HOUR_H}px`}}>
            {Array.from({length:24}).map((_,h)=>(
              <div key={h} className="hour-row" style={{height:`${HOUR_H}px`,top:`${h*HOUR_H}px`,position:'absolute',width:'100%',left:0}}>
                <span className="hour-label">{fmtHour(h)}</span>
                <div style={{position:'absolute',left:50,right:0,top:0,height:'1px',background:'var(--hour-line)'}}/>
              </div>
            ))}
            {evtBlocks.map(e=>(
              <div key={e.id} className="evt-block"
                style={{top:e.top,height:e.height,background:getEvtColor(e.colorKey),left:54,right:6}}
                onClick={()=>{if(!e.isTask&&confirm(`删除"${e.title}"?`)) onDeleteEvent(e.id);}}>
                <div className="evt-title">{e.isTask?{gold:'🥇',silver:'🥈',bronze:'🥉'}[e.tier]:''} {e.title}</div>
                {e.height>36&&<div className="evt-time">{String(e.startH).padStart(2,'0')}:{String(e.startM).padStart(2,'0')} – {String(e.endH).padStart(2,'0')}:{String(e.endM).padStart(2,'0')}</div>}
              </div>
            ))}
            {timelineEvts.length===0&&(
              <div className="day-empty" style={{position:'absolute',top:'30%',left:0,right:0}}>
                <div className="day-empty-icon">📭</div>
                <div style={{fontSize:13,color:'var(--text-secondary)'}}>今天还没有任何记录<br/>点击右上角"+ 添加"可添加事件</div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  return(
    <div className="cal-wrap">
      {view==='month'?<MonthView/>:<DayView/>}
      {showAdd&&<AddEventModal initialDate={selDate} onSave={onAddEvent} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

// ── ROOT APP ─────────────────────────────────────────
function App(){
  const [first,    setFirst]    = useLS(SK.FIRST, null);
  const [plans,    setPlans]    = useLS(SK.PLANS, {});
  const [theme,    setTheme]    = useLS(SK.THEME, 'white');
  const [events,   setEvents]   = useLS(SK.EVENTS, {});
  const [soundEnabled, setSoundEnabled] = useLS(SK.SOUND, true);
  const [hapticEnabled, setHapticEnabled] = useLS(SK.HAPTIC, true);
  const [welcomed,   setWelcomed]   = useLS(SK.WELCOMED, false);
  // activeDate tracks the last day the user officially set up a plan.
  // When activeDate !== today, the planning modal shows — NO data is ever deleted.
  const [activeDate, setActiveDate] = useLS(SK.ACTIVE_DATE, null);
  const [view,         setView]         = useState('dash');
  const [showTheme,    setShowTheme]    = useState(false);
  // Compute today fresh every render — never stale, immune to state init bugs
  const today = todayStr();
  // Force re-render every 30s and on visibilitychange so midnight is caught immediately
  const [, _tick] = useState(0);
  useEffect(()=>{
    const bump=()=>_tick(n=>n+1);
    const iv=setInterval(bump,30000);
    const onVis=()=>{ if(!document.hidden) bump(); };
    document.addEventListener('visibilitychange',onVis);
    return ()=>{ clearInterval(iv); document.removeEventListener('visibilitychange',onVis); };
  },[]);
  // Auto day-reset: set a precise timeout to fire exactly at midnight
  // When it fires, the re-render recalculates today → plan becomes null → DailyPlanModal shows
  useEffect(()=>{
    const now=new Date();
    const nextMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
    const msUntilMidnight=nextMidnight.getTime()-now.getTime();
    const t=setTimeout(()=>_tick(n=>n+1), msUntilMidnight+500);
    return ()=>clearTimeout(t);
  },[today]);

  useEffect(()=>{ if(!first) setFirst(today); },[]);

  // Global click sound + haptic — fires on every non-disabled interactive element
  useEffect(()=>{
    const handler=e=>{
      const btn=e.target.closest('button');
      if(btn&&!btn.disabled){
        playClick();
        haptic([15]);
        return;
      }
      // Non-button interactive elements
      if(e.target.closest('.task-card:not(.locked),.cal-day-cell,.theme-opt,.cal-month-header')){
        playClick();
        haptic([15]);
      }
    };
    document.addEventListener('click',handler,true);
    return ()=>document.removeEventListener('click',handler,true);
  },[]);
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    // Keep PWA theme-color in sync with current theme
    const themeColors={white:'#ffffff',cream:'#faf8f3',lavender:'#f3f0fa',green:'#f0f7f0',blue:'#f0f5ff',pink:'#fff0f5',dark:'#090912'};
    const meta=document.getElementById('theme-color-meta');
    if(meta) meta.content=themeColors[theme]||'#ffffff';
  },[theme]);

  // ── 网络状态 + 存储可用性检测 ────────────────────────
  const [isOnline,    setIsOnline]    = useState(typeof navigator!=='undefined'?navigator.onLine:true);
  const [storageOk,   setStorageOk]   = useState(true);
  useEffect(()=>{
    // 检测 localStorage 可用性（无痕模式/禁用时为 false）
    setStorageOk(checkStorageAvailable());
    // 监听网络变化
    const onOnline  = ()=>setIsOnline(true);
    const onOffline = ()=>{ setIsOnline(false); showToast('📡 当前无网络，数据已保存在本地，联网后恢复正常',4000); };
    window.addEventListener('online',  onOnline);
    window.addEventListener('offline', onOffline);
    return ()=>{ window.removeEventListener('online',onOnline); window.removeEventListener('offline',onOffline); };
  },[]);

  const dc    = React.useMemo(()=>{
    const keys=Object.keys(plans).sort();
    return dayCount(keys.length>0 ? keys[0] : (first||today));
  },[plans,first,today]);
  // Plan is valid only when user has officially activated today via the planning modal.
  // Historical plans are NEVER deleted — they stay in `plans` for calendar & review.
  const plan  = activeDate === today ? (plans[today] || null) : null;
  const streak= useMemo(()=>calcStreak(plans),[plans]);

  const savePlan=p=>{ setPlans(prev=>({...prev,[today]:p})); setActiveDate(today); };
  const updateTask=t=>setPlans(prev=>{
    const p={...prev[today]};
    if(t.tier==='gold') p.goldTask=t;
    else if(t.tier==='silver') p.silverTasks=p.silverTasks.map(x=>x.id===t.id?t:x);
    else p.bronzeTasks=p.bronzeTasks.map(x=>x.id===t.id?t:x);
    return {...prev,[today]:p};
  });
  const addEvent=e=>setEvents(prev=>({...prev,[e.id]:e}));
  const delEvent=id=>setEvents(prev=>{ const n={...prev}; delete n[id]; return n; });
  const addTask=t=>setPlans(prev=>{
    const p={...(prev[today]||{})};
    if(t.tier==='gold') p.goldTask=t;
    else if(t.tier==='silver') p.silverTasks=[...(p.silverTasks||[]),t];
    else p.bronzeTasks=[...(p.bronzeTasks||[]),t];
    return {...prev,[today]:p};
  });
  const deleteTask=t=>setPlans(prev=>{
    const p={...(prev[today]||{})};
    if(t.tier==='gold') p.goldTask=null;
    else if(t.tier==='silver') p.silverTasks=(p.silverTasks||[]).filter(x=>x.id!==t.id);
    else p.bronzeTasks=(p.bronzeTasks||[]).filter(x=>x.id!==t.id);
    return {...prev,[today]:p};
  });

  return(
    <div id="app-root">
      {/* 无痕模式 / 存储不可用提示 */}
      {!storageOk&&<div className="status-banner banner-incognito">⚠️ 无痕模式或存储被禁用，关闭页面后数据将丢失，建议切换为普通模式使用</div>}
      {/* 离线提示 */}
      {!isOnline&&<div className="status-banner banner-offline">📡 当前无网络，数据已保存在本地，联网后即可正常访问</div>}
      <div className="app-header">
        <div className="header-left">
          <div className="header-brand">
            <div className="app-header-title">1·3·5</div>
            <span className="header-subtitle">效率系统</span>
          </div>
          <div className="app-header-meta">
            <span className="header-date">{fmtDate(today)}</span>
            <span className="header-day">第 {dc} 天</span>
            {streak>0&&<span className="streak-chip">🔥 {streak}天连击</span>}
          </div>
        </div>
        <button className="settings-btn" onClick={()=>setShowTheme(true)} title="选择主题">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8"/></svg>
        </button>
      </div>

      {view==='dash'     &&plan &&<Dashboard plan={plan} onUpdate={updateTask} onAddTask={addTask} onDeleteTask={deleteTask}/>}
      {view==='cal'            &&<CalendarView plans={plans} events={events} onAddEvent={addEvent} onDeleteEvent={delEvent}/>}
      {view==='review'         &&<DataReview plans={plans}/>}
      {view==='settings'       &&<SettingsPanel soundEnabled={soundEnabled} onSoundChange={setSoundEnabled} hapticEnabled={hapticEnabled} onHapticChange={setHapticEnabled}/>}
      {!welcomed&&<WelcomeModal onStart={()=>setWelcomed(true)}/>}
      {welcomed&&!plan&&<DailyPlanModal onDone={savePlan} dayN={dc} today={today}/>}
      {showTheme&&<ThemePanel current={theme} onChange={setTheme} onClose={()=>setShowTheme(false)}/>}

      <div className="bottom-nav">
        <button className={`nav-btn${view==='dash'?' active':''}`} onClick={()=>setView('dash')}>
          <span className="nav-icon-wrap">
            <svg className="nav-svg" viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
          </span>今日任务
        </button>
        <button className={`nav-btn${view==='cal'?' active':''}`} onClick={()=>setView('cal')}>
          <span className="nav-icon-wrap">
            <svg className="nav-svg" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
          </span>日历
        </button>
        <button className={`nav-btn${view==='review'?' active':''}`} onClick={()=>setView('review')}>
          <span className="nav-icon-wrap">
            <svg className="nav-svg" viewBox="0 0 24 24"><path d="M3 20h18"/><rect x="5" y="13" width="3" height="7" rx="0.5"/><rect x="10.5" y="8" width="3" height="12" rx="0.5"/><rect x="16" y="4" width="3" height="16" rx="0.5"/></svg>
          </span>数据复盘
        </button>
        <button className={`nav-btn${view==='settings'?' active':''}`} onClick={()=>setView('settings')}>
          <span className="nav-icon-wrap">
            <svg className="nav-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </span>设置
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
