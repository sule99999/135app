<!DOCTYPE html>
<html lang="zh-CN" data-theme="white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="1·3·5" />
  <meta name="theme-color" content="#ffffff" id="theme-color-meta" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>1·3·5 效率系统</title>
  <style>
    /* ═══════════════════════════════════════
       CSS VARIABLES — DEFAULT (DARK)
    ═══════════════════════════════════════ */
    :root {
      --bg-primary:    #090912;
      --bg-secondary:  #10101a;
      --bg-card:       #16162a;
      --text-primary:  #f0f0f8;
      --text-secondary:#7070a0;

      --gold:          #FFD700;
      --gold-dim:      #a88000;
      --gold-glow:     rgba(255,215,0,0.18);
      --gold-border:   rgba(255,215,0,0.38);
      --gold-bg:       rgba(255,215,0,0.09);

      --silver:        #d8d8e8;
      --silver-dim:    #888898;
      --silver-glow:   rgba(200,200,220,0.18);
      --silver-border: rgba(200,200,220,0.38);
      --silver-bg:     rgba(200,200,220,0.08);

      --bronze:        #cd7f32;
      --bronze-dim:    #7a4a1a;
      --bronze-glow:   rgba(205,127,50,0.18);
      --bronze-border: rgba(205,127,50,0.38);
      --bronze-bg:     rgba(205,127,50,0.08);

      --success:       #3ddc84;
      --danger:        #ff5252;

      --mod-w1:#0e0e1c; --mod-w2:#06060e;
      --mod-g1:#16100a; --mod-g2:#0c0900;
      --mod-s1:#141422; --mod-s2:#0a0a16;
      --mod-b1:#130d06; --mod-b2:#090600;

      /* AMEX Gold — deep champagne gold */
      --card-gold-bg:    linear-gradient(155deg,rgba(232,195,68,0.32) 0%,rgba(200,155,18,0.26) 25%,rgba(152,108,0,0.20) 52%,rgba(196,148,8,0.24) 76%,rgba(128,88,0,0.28) 100%);
      --card-gold-border:rgba(205,162,28,0.75);
      --card-gold-shad:  0 7px 22px rgba(175,128,0,0.45),0 2px 7px rgba(0,0,0,0.55),inset 0 1.5px 0 rgba(248,218,88,0.62),inset 0 -1.5px 0 rgba(0,0,0,0.45);
      --card-gold-stripe:linear-gradient(180deg,#F0D060 0%,#C89018 42%,#8B6200 100%);

      /* AMEX Platinum — cool brushed steel */
      --card-silver-bg:  linear-gradient(155deg,rgba(215,215,232,0.28) 0%,rgba(178,178,210,0.22) 28%,rgba(125,125,168,0.17) 55%,rgba(195,195,225,0.22) 78%,rgba(98,98,148,0.20) 100%);
      --card-silver-border:rgba(192,192,228,0.70);
      --card-silver-shad:0 7px 22px rgba(130,130,195,0.38),0 2px 7px rgba(0,0,0,0.55),inset 0 1.5px 0 rgba(232,232,252,0.62),inset 0 -1.5px 0 rgba(0,0,0,0.42);
      --card-silver-stripe:linear-gradient(180deg,#E8E8F8 0%,#A8A8CC 42%,#686888 100%);

      /* AMEX Rose Gold — warm copper-rose */
      --card-bronze-bg:  linear-gradient(155deg,rgba(215,142,98,0.34) 0%,rgba(188,112,65,0.28) 25%,rgba(142,75,35,0.22) 52%,rgba(182,105,55,0.26) 76%,rgba(115,62,22,0.28) 100%);
      --card-bronze-border:rgba(205,132,72,0.72);
      --card-bronze-shad:0 7px 22px rgba(178,108,42,0.44),0 2px 7px rgba(0,0,0,0.55),inset 0 1.5px 0 rgba(242,182,122,0.62),inset 0 -1.5px 0 rgba(0,0,0,0.42);
      --card-bronze-stripe:linear-gradient(180deg,#EDB882 0%,#C8784A 42%,#8C4820 100%);

      --overlay-bg:       rgba(0,0,0,0.88);
      --timer-overlay-bg: rgba(0,0,0,0.93);
      --header-border:    rgba(255,255,255,0.05);
      --nav-border:       rgba(255,255,255,0.07);
      --subtle-border:    rgba(255,255,255,0.06);
      --table-h-border:   rgba(255,255,255,0.07);
      --table-r-border:   rgba(255,255,255,0.03);
      --input-bg:         rgba(255,255,255,0.06);
      --input-border:     rgba(255,255,255,0.14);
      --progress-track:   rgba(255,255,255,0.07);
      --chip-bg:          rgba(255,255,255,0.05);
      --chip-border:      rgba(255,255,255,0.14);
      --tab-bg:           rgba(255,255,255,0.05);
      --btn-ghost-border: rgba(255,255,255,0.14);
      --btn-ghost-color:  #7070a0;
      --dialog-bg:        #16162a;
      --cancel-color:     rgba(255,255,255,0.28);
      --cancel-hover:     rgba(255,255,255,0.55);
      --scrollbar-thumb:  #2a2a40;
      --all-done-bg:      linear-gradient(135deg,rgba(255,215,0,0.07),rgba(255,149,0,0.04));
      --all-done-border:  rgba(255,215,0,0.22);
      --dash-prog-bg:     rgba(0,0,0,0.22);
      --dash-prog-brd:    rgba(255,255,255,0.04);
      /* event block on timeline */
      --evt-text:         #fff;
      --hour-line:        rgba(255,255,255,0.06);
      --hour-label-c:     rgba(255,255,255,0.3);
      --cal-today-bg:     var(--gold);
      --cal-today-c:      #1a0800;
      --cal-dot-today:    rgba(255,255,255,0.9);
      --cal-sel-bg:       rgba(255,215,0,0.18);
      --cal-sel-border:   var(--gold);
    }

    /* ═══════════════════════════════════════
       LIGHT THEMES SHARED
    ═══════════════════════════════════════ */
    html[data-theme="white"],html[data-theme="green"],html[data-theme="blue"],
    html[data-theme="pink"],html[data-theme="cream"],html[data-theme="lavender"] {
      --gold: #A87800; --gold-dim:#7A5600; --gold-glow:rgba(168,120,0,0.22);
      --gold-border:rgba(168,120,0,0.45); --gold-bg:rgba(168,120,0,0.10);
      --silver:#5858A0; --silver-dim:#404080; --silver-glow:rgba(88,88,160,0.20);
      --silver-border:rgba(88,88,160,0.40); --silver-bg:rgba(88,88,160,0.09);
      --bronze:#A05828; --bronze-dim:#7A3E10; --bronze-glow:rgba(160,88,40,0.20);
      --bronze-border:rgba(160,88,40,0.42); --bronze-bg:rgba(160,88,40,0.09);
      --success:#1a7a46; --danger:#c0392b;
      --overlay-bg:rgba(0,0,0,0.5); --timer-overlay-bg:rgba(0,0,0,0.6);
      --header-border:rgba(0,0,0,0.07); --nav-border:rgba(0,0,0,0.08);
      --subtle-border:rgba(0,0,0,0.07); --table-h-border:rgba(0,0,0,0.09);
      --table-r-border:rgba(0,0,0,0.04);
      --input-bg:rgba(0,0,0,0.04); --input-border:rgba(0,0,0,0.14);
      --progress-track:rgba(0,0,0,0.08); --chip-bg:rgba(0,0,0,0.04);
      --chip-border:rgba(0,0,0,0.13); --tab-bg:rgba(0,0,0,0.05);
      --btn-ghost-border:rgba(0,0,0,0.13); --btn-ghost-color:rgba(0,0,0,0.4);
      --dialog-bg:var(--bg-secondary);
      --cancel-color:rgba(0,0,0,0.28); --cancel-hover:rgba(0,0,0,0.55);
      --scrollbar-thumb:rgba(0,0,0,0.15);
      /* AMEX Gold light — 香槟金，高饱和度才显色 */
      --card-gold-bg:    linear-gradient(155deg,rgba(198,152,18,0.62) 0%,rgba(172,122,0,0.52) 30%,rgba(138,92,0,0.42) 58%,rgba(165,118,0,0.50) 80%,rgba(118,80,0,0.55) 100%);
      --card-gold-border:rgba(175,128,0,0.80);
      --card-gold-shad:  0 5px 18px rgba(160,112,0,0.32),0 2px 6px rgba(0,0,0,0.14),inset 0 1.5px 0 rgba(235,192,50,0.55),inset 0 -1.5px 0 rgba(0,0,0,0.12);
      --card-gold-stripe:linear-gradient(180deg,#E8B828 0%,#B07800 42%,#784E00 100%);

      /* AMEX Platinum light — 冷调钢铁银 */
      --card-silver-bg:  linear-gradient(155deg,rgba(148,148,188,0.55) 0%,rgba(118,118,165,0.46) 30%,rgba(88,88,138,0.37) 58%,rgba(132,132,178,0.46) 80%,rgba(78,78,128,0.48) 100%);
      --card-silver-border:rgba(108,108,172,0.78);
      --card-silver-shad:0 5px 18px rgba(98,98,168,0.28),0 2px 6px rgba(0,0,0,0.14),inset 0 1.5px 0 rgba(195,195,238,0.55),inset 0 -1.5px 0 rgba(0,0,0,0.12);
      --card-silver-stripe:linear-gradient(180deg,#B8B8E0 0%,#7878B0 42%,#505080 100%);

      /* AMEX Rose Gold light — 玫瑰铜 */
      --card-bronze-bg:  linear-gradient(155deg,rgba(195,128,82,0.60) 0%,rgba(168,98,52,0.50) 30%,rgba(132,68,25,0.40) 58%,rgba(178,108,58,0.50) 80%,rgba(122,68,22,0.52) 100%);
      --card-bronze-border:rgba(188,112,48,0.80);
      --card-bronze-shad:0 5px 18px rgba(172,98,30,0.30),0 2px 6px rgba(0,0,0,0.14),inset 0 1.5px 0 rgba(235,178,118,0.55),inset 0 -1.5px 0 rgba(0,0,0,0.12);
      --card-bronze-stripe:linear-gradient(180deg,#D89858 0%,#A06228 42%,#6C3E10 100%);

      --all-done-bg:linear-gradient(135deg,rgba(200,144,10,0.07),rgba(200,100,10,0.04));
      --all-done-border:rgba(200,144,10,0.22);
      --dash-prog-bg:rgba(0,0,0,0.04); --dash-prog-brd:rgba(0,0,0,0.06);
      --evt-text:#fff;
      --hour-line:rgba(0,0,0,0.06);
      --hour-label-c:rgba(0,0,0,0.3);
      --cal-today-bg:var(--gold); --cal-today-c:#fff;
      --cal-dot-today:rgba(255,255,255,0.95);
      --cal-sel-bg:rgba(200,144,10,0.12); --cal-sel-border:var(--gold);
    }
    html[data-theme="white"]    { --bg-primary:#fff;    --bg-secondary:#f5f5f7; --bg-card:#ebebef; --text-primary:#1a1a2a; --text-secondary:#606080; --mod-w1:#fafafa; --mod-w2:#f0f0f5; --mod-g1:#fffdf5; --mod-g2:#fff8e0; --mod-s1:#f8f8fc; --mod-s2:#f0f0f8; --mod-b1:#fff8f3; --mod-b2:#fff2e8; }
    html[data-theme="green"]    { --bg-primary:#f0faf4; --bg-secondary:#e3f5eb; --bg-card:#d4eedc; --text-primary:#162a1e; --text-secondary:#4a6a56; --mod-w1:#f5fcf7; --mod-w2:#ebf7ef; --mod-g1:#fefff5; --mod-g2:#fafce8; --mod-s1:#f5fcf8; --mod-s2:#edf8f2; --mod-b1:#fef9f5; --mod-b2:#faf4ee; }
    html[data-theme="blue"]     { --bg-primary:#f0f5ff; --bg-secondary:#e3ecff; --bg-card:#d6e2ff; --text-primary:#141e40; --text-secondary:#4a5a80; --mod-w1:#f5f8ff; --mod-w2:#edf2ff; --mod-g1:#fffdf5; --mod-g2:#fff9e6; --mod-s1:#f5f8ff; --mod-s2:#edf2ff; --mod-b1:#fff8f3; --mod-b2:#fff2e8; }
    html[data-theme="pink"]     { --bg-primary:#fff5f7; --bg-secondary:#fce7ef; --bg-card:#f8daec; --text-primary:#28101e; --text-secondary:#8a5068; --mod-w1:#fff8fa; --mod-w2:#fdf0f5; --mod-g1:#fffdf5; --mod-g2:#fff9e6; --mod-s1:#fdf8fa; --mod-s2:#f8f0f5; --mod-b1:#fff8f3; --mod-b2:#fff2e8; }
    html[data-theme="cream"]    { --bg-primary:#faf7f0; --bg-secondary:#f2ebe0; --bg-card:#e8e0d0; --text-primary:#282010; --text-secondary:#6a6050; --mod-w1:#fdfaf3; --mod-w2:#f8f3e8; --mod-g1:#fffdf5; --mod-g2:#fff9e6; --mod-s1:#fdfaf3; --mod-s2:#f8f3e8; --mod-b1:#fff8f3; --mod-b2:#fff2e8; }
    html[data-theme="lavender"] { --bg-primary:#f5f3ff; --bg-secondary:#ede8ff; --bg-card:#e0dafe; --text-primary:#1c1830; --text-secondary:#6860a0; --mod-w1:#f8f6ff; --mod-w2:#f0ecff; --mod-g1:#fffdf5; --mod-g2:#fff9e6; --mod-s1:#f8f6ff; --mod-s2:#f0ecff; --mod-b1:#fff8f3; --mod-b2:#fff2e8; }

    /* ═══════════════════════════════════════
       BASE
    ═══════════════════════════════════════ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{transition:background .25s;touch-action:pan-x pan-y;-ms-touch-action:pan-x pan-y}
    body{background:var(--bg-primary);color:var(--text-primary);font-family:-apple-system,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s;touch-action:pan-x pan-y;-ms-touch-action:pan-x pan-y}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:2px}
    #app-root{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

    /* ─── HEADER ─── */
    .app-header{padding:15px 16px 10px;background:var(--bg-secondary);border-bottom:1px solid var(--header-border);position:sticky;top:0;z-index:15;display:flex;align-items:flex-start;gap:8px}
    .header-left{flex:1;min-width:0}
    .app-header-title{font-size:20px;font-weight:800;letter-spacing:1px;background:linear-gradient(90deg,#FFD700,#FF9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
    .app-header-meta{display:flex;gap:12px;font-size:11px;color:var(--text-secondary);align-items:center;flex-wrap:wrap}
    .streak-chip{background:rgba(255,149,0,0.15);color:#FF9500;border-radius:20px;padding:1px 9px;font-weight:700;font-size:11px}
    .settings-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:8px;line-height:1;opacity:0.6;transition:opacity .2s;flex-shrink:0;margin-top:1px}
    .settings-btn:hover{opacity:1}

    /* ─── BOTTOM NAV ─── */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-secondary);border-top:1px solid var(--nav-border);display:flex;z-index:25;backdrop-filter:blur(12px)}
    .nav-btn{flex:1;padding:9px 0 11px;background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:10px;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
    .nav-btn.active{color:var(--gold)}
    .nav-icon{font-size:21px;line-height:1}

    /* ─── OVERLAY / MODAL SHARED ─── */
    .overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fadeIn .2s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.55}}

    .modal-box{width:100%;max-width:420px;border-radius:22px;padding:28px 24px 24px;animation:slideUp .3s cubic-bezier(.2,.8,.4,1)}
    .modal-welcome{background:linear-gradient(145deg,var(--mod-w1),var(--mod-w2));border:1.5px solid var(--subtle-border);box-shadow:0 20px 60px rgba(0,0,0,0.55)}
    html[data-theme]:not([data-theme="dark"]) .modal-welcome{box-shadow:0 12px 40px rgba(0,0,0,0.12)}
    .modal-gold  {background:linear-gradient(145deg,var(--mod-g1),var(--mod-g2));border:1.5px solid var(--gold-border);  box-shadow:0 0 50px var(--gold-glow),  0 20px 60px rgba(0,0,0,0.5)}
    .modal-silver{background:linear-gradient(145deg,var(--mod-s1),var(--mod-s2));border:1.5px solid var(--silver-border);box-shadow:0 0 50px var(--silver-glow),0 20px 60px rgba(0,0,0,0.5)}
    .modal-bronze{background:linear-gradient(145deg,var(--mod-b1),var(--mod-b2));border:1.5px solid var(--bronze-border);box-shadow:0 0 50px var(--bronze-glow),0 20px 60px rgba(0,0,0,0.5)}
    html[data-theme]:not([data-theme="dark"]) .modal-gold,
    html[data-theme]:not([data-theme="dark"]) .modal-silver,
    html[data-theme]:not([data-theme="dark"]) .modal-bronze{box-shadow:0 6px 28px rgba(0,0,0,0.1)}

    .step-dots{display:flex;gap:7px;margin-bottom:18px}
    .step-dot{width:8px;height:8px;border-radius:50%;background:var(--chip-bg);border:1px solid var(--chip-border);transition:background .3s}
    .step-dot.done  {background:rgba(255,215,0,0.3)}
    .step-dot.active{background:var(--gold);border-color:var(--gold)}

    .modal-title{font-size:17px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
    .modal-gold   .modal-title{color:var(--gold)}
    .modal-silver .modal-title{color:var(--silver)}
    .modal-bronze .modal-title{color:var(--bronze)}
    .modal-hint{font-size:12px;color:var(--text-secondary);line-height:1.65;margin-bottom:16px}

    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:11px;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
    .form-input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:11px;padding:11px 13px;color:var(--text-primary);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
    .form-input::placeholder{color:var(--text-secondary);opacity:.6}
    .modal-gold   .form-input:focus{border-color:var(--gold);   box-shadow:0 0 0 3px var(--gold-glow)}
    .modal-silver .form-input:focus{border-color:var(--silver); box-shadow:0 0 0 3px var(--silver-glow)}
    .modal-bronze .form-input:focus{border-color:var(--bronze); box-shadow:0 0 0 3px var(--bronze-glow)}
    .form-input-sm{padding:8px 11px;font-size:13px;border-radius:9px}

    .time-chips{display:flex;flex-wrap:wrap;gap:7px}
    .time-chip{padding:5px 12px;border-radius:18px;border:1px solid var(--chip-border);background:var(--chip-bg);color:var(--text-secondary);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
    .time-chip:hover{color:var(--text-primary);border-color:var(--gold)}
    .chip-gold  {border-color:var(--gold)!important;  background:var(--gold-bg)!important;  color:var(--gold)!important}
    .chip-silver{border-color:var(--silver)!important;background:var(--silver-bg)!important;color:var(--silver)!important}
    .chip-bronze{border-color:var(--bronze)!important;background:var(--bronze-bg)!important;color:var(--bronze)!important}

    .btn{width:100%;padding:12px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .2s;font-family:inherit;letter-spacing:.3px}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    .btn:not(:disabled):hover{transform:translateY(-1px)}
    .btn-gold  {background:linear-gradient(135deg,#FFD700,#FF9500);color:#1a0800}
    .btn-gold:not(:disabled):hover  {box-shadow:0 6px 20px rgba(255,165,0,0.4)}
    .btn-silver{background:linear-gradient(135deg,#ddd,#aaa);color:#1a1a2a}
    .btn-bronze{background:linear-gradient(135deg,#cd7f32,#8B4513);color:#fff}
    .btn-green {background:linear-gradient(135deg,#3ddc84,#1a8a50);color:#001a0a}
    .btn-green:not(:disabled):hover {box-shadow:0 6px 20px rgba(61,220,132,0.35)}
    .btn-ghost{background:transparent;border:1px solid var(--btn-ghost-border);color:var(--btn-ghost-color);margin-top:9px}
    .btn-ghost:hover{border-color:var(--gold);color:var(--text-primary)}
    .btn-sm{padding:8px 16px;font-size:13px;border-radius:9px;width:auto}

    /* ─── DASHBOARD ─── */
    .dash-progress{padding:11px 15px;background:var(--dash-prog-bg);border-bottom:1px solid var(--dash-prog-brd)}
    .dash-progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:5px}
    .progress-track{height:5px;background:var(--progress-track);border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF9500);border-radius:3px;transition:width .6s cubic-bezier(.2,.8,.4,1)}

    /* ─── SECTION ─── */
    .dash-section{padding:14px 12px 0;margin-bottom:2px}
    .section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;border-radius:11px}
    .section-gold  .section-header{background:linear-gradient(90deg,rgba(255,215,0,0.14),rgba(255,165,0,0.04));border-left:3px solid rgba(255,215,0,0.7)}
    .section-silver.section-header,.section-silver .section-header{background:linear-gradient(90deg,rgba(200,200,255,0.12),rgba(160,160,220,0.03));border-left:3px solid rgba(200,200,255,0.6)}
    .section-bronze .section-header{background:linear-gradient(90deg,rgba(205,127,50,0.15),rgba(160,90,20,0.04));border-left:3px solid rgba(205,127,50,0.65)}
    .section-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px}
    .section-gold   .section-label{color:var(--gold)}
    .section-silver .section-label{color:var(--silver)}
    .section-bronze .section-label{color:var(--bronze)}
    .section-count{margin-left:auto;font-size:12px;font-weight:700;color:var(--text-secondary)}
    .section-icon{font-size:20px;line-height:1}

    /* ─── TASK CARD ─── */
    .task-card{border-radius:15px;padding:0;margin-bottom:10px;cursor:pointer;transition:transform .20s,box-shadow .20s,opacity .3s;position:relative;overflow:hidden;user-select:none}
    /* Left metallic stripe via ::before */
    .task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;z-index:2}
    .task-card-gold  {background:var(--card-gold-bg);  border:1.5px solid var(--card-gold-border);  box-shadow:var(--card-gold-shad)}
    .task-card-silver{background:var(--card-silver-bg);border:1.5px solid var(--card-silver-border);box-shadow:var(--card-silver-shad)}
    .task-card-bronze{background:var(--card-bronze-bg);border:1.5px solid var(--card-bronze-border);box-shadow:var(--card-bronze-shad)}
    .task-card-gold  ::before,.task-card-gold  .card-inner::before,.task-card-gold::before  {background:var(--card-gold-stripe)}
    .task-card-silver::before{background:var(--card-silver-stripe)}
    .task-card-bronze::before{background:var(--card-bronze-stripe)}
    /* Top shine overlay */
    .task-card::after{content:'';position:absolute;top:0;left:0;right:0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,transparent 100%);border-radius:15px 15px 0 0;pointer-events:none;z-index:1}
    /* Inner padding wrapper (handles the left-stripe offset) */
    .card-inner{padding:13px 14px 13px 18px;position:relative;z-index:2}
    .task-card.locked{opacity:.35;cursor:not-allowed;pointer-events:none}
    .task-card.done-card{opacity:.60;cursor:default}
    .task-card:not(.locked):active{transform:scale(0.985)}
    .task-card:not(.locked):hover{transform:translateY(-3px)}
    .task-card-gold:not(.locked):hover  {box-shadow:0 12px 32px rgba(200,148,0,0.48),0 4px 10px rgba(0,0,0,0.50),inset 0 1.5px 0 rgba(255,248,140,0.60),inset 0 -1.5px 0 rgba(0,0,0,0.42)}
    .task-card-silver:not(.locked):hover{box-shadow:0 12px 32px rgba(155,155,215,0.42),0 4px 10px rgba(0,0,0,0.50),inset 0 1.5px 0 rgba(242,242,255,0.60),inset 0 -1.5px 0 rgba(0,0,0,0.42)}
    .task-card-bronze:not(.locked):hover{box-shadow:0 12px 32px rgba(170,105,28,0.50),0 4px 10px rgba(0,0,0,0.50),inset 0 1.5px 0 rgba(255,195,95,0.60),inset 0 -1.5px 0 rgba(0,0,0,0.42)}

    .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .card-title{font-size:14px;font-weight:600;line-height:1.4;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
    .card-title.title-expanded{-webkit-line-clamp:unset;display:block}
    .card-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;border:1px solid}
    .badge-gold  {background:rgba(255,215,0,0.15);color:var(--gold);  border-color:rgba(255,215,0,0.40)}
    .badge-silver{background:rgba(200,200,240,0.15);color:var(--silver);border-color:rgba(200,200,240,0.40)}
    .badge-bronze{background:rgba(205,127,50,0.15);color:var(--bronze);border-color:rgba(205,127,50,0.40)}
    .card-meta{margin-top:6px;font-size:11px;color:var(--text-secondary);display:flex;gap:12px;align-items:center}
    .card-edit-btn{background:none;border:none;cursor:pointer;font-size:15px;opacity:.5;border-radius:8px;line-height:1;transition:opacity .15s;min-width:40px;min-height:40px;display:inline-flex;align-items:center;justify-content:center;padding:0;margin:-8px -2px;-webkit-tap-highlight-color:transparent}
    .card-btn-group{margin-left:auto;display:flex;gap:0;flex-shrink:0;align-items:center}
    .card-edit-btn:hover{opacity:1}
    .add-task-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border-radius:13px;border:1.5px dashed var(--subtle-border);background:none;color:var(--text-secondary);font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;transition:border-color .2s,color .2s}
    .add-task-btn:hover{border-color:var(--gold);color:var(--gold)}
    .tier-btn-row{display:flex;gap:8px;margin-bottom:14px}
    .tier-btn{flex:1;padding:8px 0;border-radius:10px;border:1.5px solid var(--subtle-border);background:none;color:var(--text-secondary);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
    .tier-btn.active-gold{border-color:var(--gold);background:var(--gold-bg);color:var(--gold)}
    .tier-btn.active-silver{border-color:var(--silver);background:var(--silver-bg);color:var(--silver)}
    .tier-btn.active-bronze{border-color:var(--bronze);background:var(--bronze-bg);color:var(--bronze)}
    .tier-btn.tier-full{opacity:.45;cursor:pointer}
    .toast-inline{background:rgba(255,160,0,.1);border:1px solid rgba(255,160,0,.3);color:var(--gold);font-size:11px;font-weight:600;padding:8px 12px;border-radius:10px;margin-bottom:12px;line-height:1.5;animation:toastSlide .2s ease}
    @keyframes toastSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .tier-prog-bar{display:flex;align-items:center;gap:12px;padding:10px 15px;background:var(--dash-prog-bg);border-bottom:1px solid var(--dash-prog-brd);flex-wrap:wrap}
    .tier-prog-group{display:flex;align-items:center;gap:2px}
    .tier-prog-pip{font-size:13px;color:var(--text-secondary);line-height:1;transition:color .3s,transform .3s}
    .tier-prog-pip.pip-done{color:var(--gold);transform:scale(1.15)}
    .tier-prog-badge{font-size:9px;font-weight:700;color:var(--success);background:rgba(76,175,80,.13);padding:2px 6px;border-radius:8px;margin-left:4px}
    @keyframes goldPop{0%{opacity:0;transform:scale(.65)}65%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
    .gold-celebrate{animation:goldPop .55s cubic-bezier(.34,1.56,.64,1) both;text-align:center;padding:6px 0}
    .custom-time-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .custom-time-input{width:72px;padding:5px 8px;border-radius:8px;border:1px solid var(--subtle-border);background:var(--bg-card);color:var(--text-primary);font-size:13px;text-align:center}
    .sound-toggle{position:relative;width:46px;height:26px;border-radius:13px;border:none;cursor:pointer;transition:background .22s;flex-shrink:0;padding:0}
    .sound-toggle.on {background:var(--success)}
    .sound-toggle.off{background:var(--text-secondary);opacity:.55}
    .sound-toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:10px;background:#fff;top:3px;transition:left .22s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .sound-toggle.on::after {left:23px}
    .sound-toggle.off::after{left:3px}
    .done-stamp-gold  {color:rgba(255,215,0,0.45);border-color:rgba(255,215,0,0.38)}
    .done-stamp-silver{color:rgba(180,180,200,0.45);border-color:rgba(180,180,200,0.38)}
    .done-stamp-bronze{color:rgba(205,127,50,0.45);border-color:rgba(205,127,50,0.38)}
    html[data-theme]:not([data-theme="dark"]) .done-stamp-gold  {color:rgba(180,120,0,0.45);border-color:rgba(180,120,0,0.38)}
    html[data-theme]:not([data-theme="dark"]) .done-stamp-silver{color:rgba(60,60,80,0.38);border-color:rgba(60,60,80,0.3)}
    html[data-theme]:not([data-theme="dark"]) .done-stamp-bronze{color:rgba(139,69,19,0.45);border-color:rgba(139,69,19,0.38)}
    .done-stamp{position:absolute;top:50%;right:13px;transform:translateY(-50%) rotate(-12deg);font-size:17px;font-weight:900;border:2px solid;padding:1px 6px;border-radius:5px;letter-spacing:2px;pointer-events:none}
    .card-detail-row{display:flex;gap:16px;margin-top:9px}
    .card-detail-col label{font-size:10px;color:var(--text-secondary);display:block;margin-bottom:2px}
    .card-detail-col span{font-size:13px;font-weight:700}

    .all-done-banner{text-align:center;padding:28px 18px;margin:11px;background:var(--all-done-bg);border:1px solid var(--all-done-border);border-radius:18px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}

    /* ─── TIMER ─── */
    .timer-overlay{position:fixed;inset:0;background:var(--timer-overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:60;padding:20px;animation:fadeIn .25s}
    .timer-card{width:100%;max-width:400px;border-radius:26px;padding:34px 26px 28px;text-align:center;animation:slideUp .35s cubic-bezier(.2,.8,.4,1)}
    .timer-gold  {background:linear-gradient(145deg,var(--mod-g1),var(--mod-g2));border:2px solid var(--gold);  box-shadow:0 0 70px var(--gold-glow)}
    .timer-silver{background:linear-gradient(145deg,var(--mod-s1),var(--mod-s2));border:2px solid var(--silver);box-shadow:0 0 70px var(--silver-glow)}
    .timer-bronze{background:linear-gradient(145deg,var(--mod-b1),var(--mod-b2));border:2px solid var(--bronze);box-shadow:0 0 70px var(--bronze-glow)}
    .timer-tier-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
    .timer-gold   .timer-tier-label{color:var(--gold-dim)}
    .timer-silver .timer-tier-label{color:var(--silver-dim)}
    .timer-bronze .timer-tier-label{color:var(--bronze-dim)}
    .timer-task-name{font-size:15px;font-weight:600;line-height:1.4}
    .timer-gold   .timer-task-name{color:var(--gold)}
    .timer-silver .timer-task-name{color:var(--silver)}
    .timer-bronze .timer-task-name{color:var(--bronze)}
    .timer-digits{font-size:70px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:3px;line-height:1;margin:18px 0 4px;font-family:'Courier New',monospace;transition:color .4s}
    .digits-normal  {color:var(--text-primary)}
    .digits-overtime{color:var(--danger);animation:pulse .9s infinite}
    .timer-prog-wrap{width:100%;height:4px;background:var(--progress-track);border-radius:2px;margin:12px 0 8px;overflow:hidden}
    .timer-prog-bar{height:100%;border-radius:2px;transition:width 1s linear}
    .timer-gold   .timer-prog-bar{background:var(--gold)}
    .timer-silver .timer-prog-bar{background:var(--silver)}
    .timer-bronze .timer-prog-bar{background:var(--bronze)}
    .timer-status{font-size:12px;color:var(--text-secondary);margin-bottom:20px}
    .timer-status.overtime{color:var(--danger);font-weight:600}

    /* ─── DIALOG / EVAL ─── */
    .dialog-box{width:100%;max-width:340px;background:var(--dialog-bg);border-radius:20px;padding:26px 20px;border:1px solid var(--subtle-border);animation:popIn .3s cubic-bezier(.34,1.56,.64,1);text-align:center}
    .dialog-emoji{font-size:40px;margin-bottom:11px}
    .dialog-title{font-size:17px;font-weight:700;margin-bottom:5px}
    .dialog-sub  {font-size:12px;color:var(--text-secondary);margin-bottom:18px;line-height:1.6}
    .dialog-row  {display:flex;gap:9px}
    .dialog-btn  {flex:1;padding:11px;border-radius:11px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .15s}
    .dialog-btn:hover{transform:translateY(-1px)}
    .dialog-yes{background:linear-gradient(135deg,#3ddc84,#1a8a50);color:#001a0a}
    .dialog-no {background:var(--chip-bg);border:1px solid var(--chip-border);color:var(--text-secondary)}
    .dialog-cancel{width:100%;margin-top:10px;padding:9px;background:transparent;border:1px solid var(--btn-ghost-border);border-radius:10px;color:var(--cancel-color);font-size:12px;cursor:pointer;font-family:inherit;transition:color .2s}
    .dialog-cancel:hover{color:var(--cancel-hover)}

    .success-splash{text-align:center;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);padding:18px}
    .success-emoji{font-size:84px;display:block;margin-bottom:12px}
    .success-title{font-size:27px;font-weight:800;color:var(--success);margin-bottom:7px}
    .success-sub  {font-size:13px;color:var(--text-secondary)}

    /* ─── DATA REVIEW ─── */
    .review-wrap{padding:13px 13px 80px}
    .review-top{text-align:center;padding:14px 0 12px}
    .review-top h2{font-size:19px;font-weight:700;margin-bottom:2px}
    .review-top p{font-size:12px;color:var(--text-secondary)}

    .review-tabs{display:flex;background:var(--tab-bg);border-radius:11px;padding:4px;gap:3px;margin-bottom:13px}
    .rtab{flex:1;padding:7px 3px;border:none;background:transparent;color:var(--text-secondary);border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;font-weight:500}
    .rtab.active{background:var(--gold);color:#1a0800;font-weight:700}

    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:11px}
    .stat-tile{background:var(--bg-secondary);border-radius:12px;padding:13px 7px;text-align:center;border:1px solid var(--subtle-border)}
    .stat-val{font-size:25px;font-weight:800;line-height:1.15;display:block}
    .stat-lbl{font-size:10px;color:var(--text-secondary);margin-top:2px}

    .review-card{background:var(--bg-secondary);border-radius:13px;padding:13px;margin-bottom:11px;border:1px solid var(--subtle-border)}
    .review-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary);margin-bottom:11px}

    .heatmap{display:flex;flex-wrap:wrap;gap:3px}
    .hm-cell{width:13px;height:13px;border-radius:3px;background:var(--chip-bg)}
    .hm-1{background:rgba(200,144,10,0.2)}.hm-2{background:rgba(200,144,10,0.42)}
    .hm-3{background:rgba(200,144,10,0.65)}.hm-4{background:rgba(200,144,10,0.90)}
    html[data-theme="dark"] .hm-1{background:rgba(255,215,0,0.18)}
    html[data-theme="dark"] .hm-2{background:rgba(255,215,0,0.38)}
    html[data-theme="dark"] .hm-3{background:rgba(255,215,0,0.62)}
    html[data-theme="dark"] .hm-4{background:rgba(255,215,0,0.90)}
    .hm-legend{display:flex;gap:5px;align-items:center;margin-top:6px;font-size:10px;color:var(--text-secondary)}
    .hm-sw{width:11px;height:11px;border-radius:2px}

    .bar-chart-wrap{display:flex;align-items:flex-end;gap:5px;height:78px;padding-bottom:17px;position:relative}
    .bar-grp{flex:1;display:flex;gap:2px;align-items:flex-end;position:relative}
    .bar{flex:1;border-radius:3px 3px 0 0;min-height:2px;transition:height .5s}
    .bar-plan{background:var(--gold-bg);border:1px solid var(--gold-border)}
    .bar-act {background:var(--gold);opacity:.85}
    .bar-lbl{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text-secondary);white-space:nowrap}
    .chart-legend{display:flex;gap:13px;margin-top:7px;font-size:10px;color:var(--text-secondary)}
    .legend-sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:3px;vertical-align:middle}

    .sum-table{width:100%;border-collapse:collapse;font-size:12px}
    .sum-table th{padding:6px 9px;text-align:left;border-bottom:1px solid var(--table-h-border);font-weight:700;font-size:10px;color:var(--text-secondary);text-transform:uppercase}
    .sum-table td{padding:8px 9px;border-bottom:1px solid var(--table-r-border)}
    .sum-table tr:last-child td{border-bottom:none}

    .badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
    .badge-tile{text-align:center}
    .badge-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;margin:0 auto 4px}
    .badge-locked  {background:var(--chip-bg);opacity:.3;filter:grayscale(1)}
    .badge-unlocked{background:linear-gradient(135deg,var(--gold-bg),rgba(255,149,0,0.1));border:1px solid var(--gold-border)}
    .badge-name{font-size:10px;color:var(--text-secondary);line-height:1.3}

    /* ─── THEME PANEL ─── */
    .theme-btn-row{display:flex;flex-direction:column;gap:6px}
    .theme-opt{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;border:1.5px solid transparent;background:var(--chip-bg);cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
    .theme-opt:hover{background:var(--gold-bg);border-color:var(--gold-border)}
    .theme-opt.selected{border-color:var(--gold);background:var(--gold-bg);box-shadow:0 0 0 2px var(--gold)}
    .theme-swatch{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(0,0,0,0.1);font-size:13px}
    .theme-label{font-size:13px;font-weight:500;color:var(--text-primary);flex:1}
    .theme-check{color:var(--gold);font-size:13px;font-weight:900;width:20px;height:20px;border-radius:50%;border:2px solid var(--gold);display:inline-flex;align-items:center;justify-content:center;background:rgba(255,215,0,.18);flex-shrink:0}

    /* ═══════════════════════════════════════
       CALENDAR STYLES
    ═══════════════════════════════════════ */
    .cal-wrap{padding:0 0 80px}

    /* Month header */
    .cal-month-header{display:flex;align-items:center;padding:14px 14px 10px;gap:8px;background:var(--bg-secondary);border-bottom:1px solid var(--subtle-border);position:sticky;top:0;z-index:5}
    .cal-month-title{flex:1;text-align:center;font-size:17px;font-weight:700}
    .cal-nav-btn{background:none;border:none;font-size:22px;color:var(--text-secondary);cursor:pointer;padding:4px 8px;border-radius:8px;transition:color .2s;line-height:1}
    .cal-nav-btn:hover{color:var(--text-primary)}
    .cal-today-btn{background:var(--gold-bg);border:1px solid var(--gold-border);color:var(--gold);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
    .cal-today-btn:hover{background:var(--gold);color:#1a0800}

    /* Day labels */
    .cal-days-row{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px;border-bottom:1px solid var(--subtle-border);background:var(--bg-secondary)}
    .cal-day-label{text-align:center;padding:7px 0;font-size:11px;font-weight:600;color:var(--text-secondary)}
    .cal-day-label:nth-child(7){color:var(--danger)}

    /* Month grid */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;padding:6px 10px}
    .cal-cell{min-height:58px;padding:5px 3px 4px;cursor:pointer;border-radius:10px;transition:background .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
    .cal-cell:hover{background:var(--chip-bg)}
    .cal-cell.other-month .cal-date-num{opacity:.3}
    .cal-date-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;transition:all .2s}
    .cal-cell.today .cal-date-num{background:var(--cal-today-bg);color:var(--cal-today-c);font-weight:700}
    .cal-cell.selected .cal-date-num{background:var(--cal-sel-bg);border:1.5px solid var(--cal-sel-border);color:var(--text-primary);font-weight:700}
    .cal-cell.today.selected .cal-date-num{background:var(--cal-today-bg);color:var(--cal-today-c)}
    .cal-dots{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;max-width:36px}
    .cal-dot{width:5px;height:5px;border-radius:50%}

    /* Event colors */
    .ec-gold  {background:#c8900a}.ec-silver{background:#505060}
    .ec-bronze{background:#8B4513}.ec-blue  {background:#2c6fad}
    .ec-green {background:#2a7a50}.ec-pink  {background:#c0406a}
    .ec-purple{background:#6040c0}
    html[data-theme="dark"] .ec-gold{background:#FFD700}

    /* Day view */
    .cal-day-header{display:flex;align-items:center;padding:12px 14px;gap:8px;background:var(--bg-secondary);border-bottom:1px solid var(--subtle-border)}
    .cal-back-btn{background:none;border:none;color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:8px;transition:background .15s}
    .cal-back-btn:hover{background:var(--gold-bg)}
    .cal-day-title{flex:1;font-size:15px;font-weight:700;text-align:center}

    /* ── 9. ADD-TASK BUTTON: more inviting ── */

  <script>
    /* ── 防缩放：三重保险 ──────────────────────────────
       1. viewport meta 已设 maximum-scale=1 user-scalable=no
       2. CSS touch-action:pan-x pan-y 禁止浏览器缩放手势
       3. JS 拦截 gesturestart / wheel(ctrlKey) / touchmove 多指
    ─────────────────────────────────────────────────── */
    // iOS Safari gesture zoom
    document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, {passive:false});
    document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, {passive:false});
    document.addEventListener('gestureend',   function(e){ e.preventDefault(); }, {passive:false});
    // Ctrl+滚轮缩放（桌面端）
    document.addEventListener('wheel', function(e){ if(e.ctrlKey){ e.preventDefault(); } }, {passive:false});
    // 多指 touchmove → 捏合缩放
    document.addEventListener('touchmove', function(e){ if(e.touches.length>1){ e.preventDefault(); } }, {passive:false});
    // 兜底：若 scale 被意外改变则强制重置 viewport
    (function resetZoomIfNeeded(){
      var vp=document.querySelector('meta[name=viewport]');
      function fix(){
        if(Math.round(window.innerWidth)!==Math.round(screen.width/window.devicePixelRatio) && window.visualViewport){
          if(window.visualViewport.scale>1.01){
            vp.setAttribute('content',
              'width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover');
          }
        }
      }
      if(window.visualViewport){
        window.visualViewport.addEventListener('resize', fix);
      }
    })();
  </script>

function isHapticOn(){ try{ const v=localStorage.getItem(SK.HAPTIC); return v===null?true:JSON.parse(v); }catch(e){ return true; } }
let _audioCtx=null;
let _reverbBuf=null; // 缓存混响冲激响应，只生成一次
function getAudioCtx(){
  try{
    if(!_audioCtx||_audioCtx.state==='closed'){
      _audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      _reverbBuf=null; // ctx 重建时清除缓存
    }
    if(_audioCtx.state==='suspended') _audioCtx.resume();
    return _audioCtx;
  }catch(e){ return null; }
}
function _getReverbBuf(ctx){
  if(_reverbBuf) return _reverbBuf;
  const sr=ctx.sampleRate;
  const revLen=Math.floor(sr*0.13);
  _reverbBuf=ctx.createBuffer(2,revLen,sr);
  for(let c=0;c<2;c++){
    const d=_reverbBuf.getChannelData(c);
    for(let i=0;i<revLen;i++)
      d[i]=(Math.random()*2-1)*Math.pow(1-i/revLen,2.2)*0.28;
  }
  return _reverbBuf;
}
// ── 移动端后台恢复：页面重新可见或任意触摸时自动 resume AudioContext ──
function _tryResumeAudio(){
  if(_audioCtx && _audioCtx.state==='suspended') _audioCtx.resume().catch(()=>{});
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) _tryResumeAudio(); });
['touchstart','pointerdown','click'].forEach(ev=>
  document.addEventListener(ev, _tryResumeAudio, {passive:true, capture:true})
);
function playTone(ctx,freq,start,dur,vol=0.25,type='sine'){
  const osc=ctx.createOscillator(),g=ctx.createGain();
  osc.connect(g);g.connect(ctx.destination);
  osc.type=type;osc.frequency.value=freq;
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+0.04);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  osc.start(start);osc.stop(start+dur+0.05);
}
function playClick(){  // 泡泡声：do/mi/so 随机音调，柔和下滑
  if(!isSoundOn()) return;
  const ctx=getAudioCtx(); if(!ctx)return;
  const t=ctx.currentTime;
  const master=ctx.createGain(); master.gain.value=0.72;
  master.connect(ctx.destination);
  // do/mi/so 三个基频，避免连续重复
  const roots=[520,660,780];
  const last=playClick._last||0;
  const pool=roots.filter(n=>n!==last);
  const base=pool[Math.floor(Math.random()*pool.length)];
  playClick._last=base;
  // 泡泡戳破：正弦波从基频快速下滑到低频（泡泡膜破裂时气压骤降）
  function bubble(freqStart,freqEnd,vol,dur){
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(freqStart,t);
    osc.frequency.exponentialRampToValueAtTime(freqEnd,t+dur*0.6);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.006);    // 极短起音（泡泡戳的瞬间）
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    osc.connect(g); g.connect(master);
    osc.start(t); osc.stop(t+dur+0.01);
  }
  bubble(base,      base*0.18, 0.55, 0.10);   // 主泡：基频下滑到极低（"bloop"感）
  bubble(base*1.52, base*0.30, 0.18, 0.07);   // 泛音层：稍高的小泡同时破裂
}
function playBeep(){  // soft single ping when overtime starts
  if(!isSoundOn()) return;
  const ctx=getAudioCtx(); if(!ctx)return;
  playTone(ctx,880,ctx.currentTime,0.4,0.18);
}
function playChime(){  // 3-note ascending chime when evaluate shows
  if(!isSoundOn()) return;
  const ctx=getAudioCtx(); if(!ctx)return;
  const t=ctx.currentTime;
  playTone(ctx,523,t,0.55,0.22);
  playTone(ctx,659,t+0.18,0.55,0.22);
  playTone(ctx,784,t+0.36,0.7,0.22);
}
function playSuccess(){  // cheerful arpeggio on task complete
  if(!isSoundOn()) return;
  const ctx=getAudioCtx(); if(!ctx)return;
  const t=ctx.currentTime;
  [523,659,784,1047].forEach((f,i)=>playTone(ctx,f,t+i*0.12,0.45,0.18));
}
function haptic(pattern=[100]){ if(!isHapticOn()) return; try{ navigator.vibrate&&navigator.vibrate(pattern); }catch(e){} }
const fmtDate  = d => { const x=new Date(d+' 12:00'); return `${x.getFullYear()}年${x.getMonth()+1}月${x.getDate()}日`; };
const fmtDateShort = d => { const x=new Date(d+' 12:00'); return `${x.getMonth()+1}月${x.getDate()}日`; };
const dayCount = f => {
  if(!f) return 1;
  // Parse both dates as local noon to avoid UTC-offset day-boundary errors
  const start=new Date(f+' 12:00:00'); start.setHours(12,0,0,0);
  const now=new Date(); now.setHours(12,0,0,0);
  return Math.max(1,Math.floor((now-start)/864e5)+1);
};
const weekOf   = d => { const x=new Date(d+' 12:00'),dy=x.getDay(); x.setDate(x.getDate()-dy+(dy===0?-6:1)); return x.toISOString().split('T')[0]; };

function showToast(msg, duration=4500){
  let el=document.getElementById('app-toast');
  if(!el){ el=document.createElement('div'); el.id='app-toast'; document.body.appendChild(el); }
  el.textContent=msg;
  el.className='toast-visible';
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>{ el.className=''; },duration);
}

function isDark() { return document.documentElement.getAttribute('data-theme')==='dark'; }
function getEvtColor(colorKey) {
  const c = EVENT_COLORS[colorKey] || EVENT_COLORS.blue;
  return isDark() ? c.dark : c.hex;
}

function useLS(key,def){
  const [v,setV]=useState(()=>{ try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;} });
  const set=useCallback(u=>setV(prev=>{
    const nv=typeof u==='function'?u(prev):u;
    try{
      localStorage.setItem(key,JSON.stringify(nv));
    }catch(e){
      if(e&&(e.name==='QuotaExceededError'||e.name==='NS_ERROR_DOM_QUOTA_REACHED'||e.code===22)){
        showToast('⚠️ 本地存储空间已满！请先在设置页导出数据备份，再清理浏览器缓存。',6000);
      }else{
        showToast('⚠️ 数据保存失败，可能处于无痕模式或浏览器禁用了本地存储。',5000);
      }
    }
    return nv;
  }),[key]);
  return [v,set];
}

const localDateStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
function calcStreak(plans){ let c=0,d=new Date(); while(true){ const k=localDateStr(d),p=plans[k]; if(p&&planTasks(p).some(t=>t.status==='completed')){c++;d.setDate(d.getDate()-1);}else break;} return c; }
function calcMaxStreak(plans){ let mx=0,c=0; Object.keys(plans).sort().forEach(d=>{ const p=plans[d]; if(p&&planTasks(p).some(t=>t.status==='completed')){c++;mx=Math.max(mx,c);}else c=0;}); return mx; }

// Get timeline events for a date (from plans + custom)
function getTimelineEvents(dateStr, plans, customEvts) {
  const plan = plans[dateStr];
  const taskEvts = plan ? planTasks(plan).filter(t=>t.completedAt).map(t=>{
    const endDt = new Date(t.completedAt);
    // Derive real working window: end = completedAt, start = end - actualMinutes
    const actualMs = (t.actualMinutes||t.estimatedMinutes||25)*60000;
    const startDt = new Date(endDt.getTime() - actualMs);
    return {
      id:t.id, title:t.title, colorKey:TIER_TO_COLOR[t.tier]||'gold',
      startH:startDt.getHours(), startM:startDt.getMinutes(),
      endH:endDt.getHours(), endM:endDt.getMinutes(),
      isTask:true, tier:t.tier, allDay:false,
    };
  }) : [];
  const custEvts = Object.values(customEvts||{}).filter(e=>e.date===dateStr).map(e=>{
    if(e.allDay) return {...e, isTask:false, colorKey:e.color||'blue', allDay:true};
    const [sh,sm]=(e.startTime||'09:00').split(':').map(Number);
    const [eh,em]=(e.endTime||e.startTime||'10:00').split(':').map(Number);
    const safeEh = (eh*60+em) <= (sh*60+sm) ? sh+1 : eh;
    const safeEm = (eh*60+em) <= (sh*60+sm) ? sm : em;
    return {...e, isTask:false, colorKey:e.color||'blue', startH:sh, startM:sm, endH:safeEh, endM:safeEm, allDay:false};
  });
  return [...taskEvts, ...custEvts];
}

// Get all dates that have events (for month dots)
function getDayDots(dateStr, plans, customEvts) {
  const evts = getTimelineEvents(dateStr, plans, customEvts);
  const colors = [...new Set(evts.map(e=>e.colorKey))].slice(0,4);
  return colors;
}

function TimePicker({value,onChange,tier,isCheckIn,onCheckInChange}){
  const [customMode,setCustomMode]=useState(false);
  const [customVal,setCustomVal]=useState('');
  const isCustom=!isCheckIn&&!TIME_OPTS.includes(value)&&value>0;

  const applyCustom=()=>{
    const v=parseInt(customVal);
    if(v>0&&v<=600){onChange(v);setCustomMode(false);setCustomVal('');}
  };
  const selectCheckIn=()=>{ onCheckInChange&&onCheckInChange(true); onChange(0); setCustomMode(false); };
  const selectPreset=t=>{ onChange(t); onCheckInChange&&onCheckInChange(false); setCustomMode(false); };
  const openCustom=()=>{ setCustomMode(true); onCheckInChange&&onCheckInChange(false); setCustomVal(isCustom?String(value):''); };

  return(
    <div>
      <div className="time-chips">
        {onCheckInChange&&(
          <button className={`time-chip${isCheckIn?` chip-${tier}`:''}`} onClick={selectCheckIn}>✓ 打卡</button>
        )}
        {TIME_OPTS.map(t=>(
          <button key={t} className={`time-chip${!isCheckIn&&value===t&&!customMode?` chip-${tier}`:''}`} onClick={()=>selectPreset(t)}>{t}分钟</button>
        ))}
        <button className={`time-chip${(customMode||isCustom)&&!isCheckIn?` chip-${tier}`:''}`} onClick={openCustom}>自定义</button>
      </div>
      {customMode&&(
        <div className="custom-time-row" style={{marginTop:8}}>
          <input className="custom-time-input" type="number" min="1" max="600" placeholder="分钟"
            value={customVal} onChange={e=>setCustomVal(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&applyCustom()} autoFocus/>
          <button className={`time-chip chip-${tier}`} onClick={applyCustom}>确认</button>
          <button className="time-chip" onClick={()=>{setCustomMode(false);setCustomVal('');}}>取消</button>
        </div>
      )}
      {isCustom&&!customMode&&(
        <div style={{fontSize:11,color:'var(--text-secondary)',marginTop:6}}>自定义：{value} 分钟</div>
      )}
    </div>
  );
}

// ── DAILY PLAN MODAL ─────────────────────────────────
function DailyPlanModal({onDone,dayN,today}){
  const [step,setStep]=useState(1);
  const [goldTitle,setGoldTitle]=useState('');
  const [goldTime,setGoldTime]=useState(25);
  const [goldIsCheckIn,setGoldIsCheckIn]=useState(false);
  const silverRef=useRef([]);
  const bronzeRef=useRef([]);
  const [svStep,setSvStep]=useState(0);
  const [bzStep,setBzStep]=useState(0);
  const [curIn,setCurIn]=useState('');
  const [curT,setCurT]=useState(25);
  const [curIsCheckIn,setCurIsCheckIn]=useState(false);
  const newTask=(title,time,tier,ici)=>({id:genId(),title,estimatedMinutes:ici?0:time,tier,status:'idle',actualMinutes:null,pauseCount:0,timerStartedAt:null,completedAt:null,remainingSeconds:null,isCheckIn:!!ici});
  const resetCur=()=>{setCurIn('');setCurT(25);setCurIsCheckIn(false);};
  const finish=()=>onDone({date:today,goldTask:newTask(goldTitle,goldTime,'gold',goldIsCheckIn),silverTasks:silverRef.current,bronzeTasks:bronzeRef.current});
  const StepDots=({cur,total})=>(<div className="step-dots">{Array.from({length:total}).map((_,i)=>(<div key={i} className={`step-dot${i<cur?' done':i===cur?' active':''}`}/>))}</div>);
  function goToBronze(){setStep(4);setSvStep(0);setBzStep(0);resetCur();}
  function doSilver(skip){
    if(!skip&&curIn.trim()) silverRef.current=[...silverRef.current,newTask(curIn.trim(),curT,'silver',curIsCheckIn)];
    // First skip ends the silver section immediately
    if(skip){goToBronze();return;}
    const next=svStep+1;
    if(next>=3){goToBronze();}else{setSvStep(next);resetCur();}
  }
  function doBronze(skip){
    if(!skip&&curIn.trim()) bronzeRef.current=[...bronzeRef.current,newTask(curIn.trim(),curT,'bronze',curIsCheckIn)];
    // First skip ends bronze and finishes planning
    if(skip){finish();return;}
    const next=bzStep+1;
    if(next>=5) finish(); else{setBzStep(next);resetCur();}
  }
  if(step===1) return(<div className="overlay"><div className="modal-box modal-welcome" style={{textAlign:'center'}}>
    <div style={{fontSize:50,marginBottom:11}}>🌟</div>
    <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:5}}>今天是</div>
    <div style={{fontSize:21,fontWeight:800,marginBottom:6}}>{fmtDate(today)}</div>
    <div style={{fontSize:14,color:'var(--gold)',marginBottom:20}}>这是您使用本系统的第 <span style={{fontSize:26,fontWeight:800}}>{dayN}</span> 天</div>
    <div style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.7,marginBottom:22}}>今天也要全力以赴！<br/>让我们规划今日的 1·3·5 任务吧 →</div>
    <button className="btn btn-gold" onClick={()=>setStep(2)}>开始规划今日任务 ✨</button>
  </div></div>);
  if(step===2) return(<div className="overlay"><div className="modal-box modal-gold">
    <StepDots cur={1} total={4}/>
    <div className="modal-title">🥇 今日最重要的一件事</div>
    <div className="modal-hint">这件事必须完成。如果今天只能做一件事，就是它。</div>
    <div className="form-group"><label className="form-label">任务名称</label>
      <input className="form-input" placeholder="今天最重要的事情是…" value={goldTitle} onChange={e=>setGoldTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&goldTitle.trim()&&setStep(3)} maxLength={100} autoFocus/></div>
    <div className="form-group"><label className="form-label">预计用时</label><TimePicker value={goldTime} onChange={setGoldTime} tier="gold" isCheckIn={goldIsCheckIn} onCheckInChange={setGoldIsCheckIn}/></div>
    <button className="btn btn-gold" disabled={!goldTitle.trim()} onClick={()=>setStep(3)}>确定 →</button>
  </div></div>);
  if(step===3) return(<div className="overlay"><div className="modal-box modal-silver">
    <StepDots cur={2} total={4}/>
    <div className="modal-title">🥈 重要的事 ({svStep+1}/3)</div>
    <div className="modal-hint">这些事很重要，今天尽量完成。可以跳过某项。</div>
    <div className="form-group"><label className="form-label">任务名称（可跳过）</label>
      <input className="form-input" placeholder={`第 ${svStep+1} 件重要的事…`} value={curIn} onChange={e=>setCurIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&curIn.trim()&&doSilver(false)} maxLength={100} autoFocus/></div>
    <div className="form-group"><label className="form-label">预计用时</label><TimePicker value={curT} onChange={setCurT} tier="silver" isCheckIn={curIsCheckIn} onCheckInChange={setCurIsCheckIn}/></div>
    <button className="btn btn-silver" disabled={!curIn.trim()} onClick={()=>doSilver(false)}>确定 →</button>
    <button className="btn btn-ghost" onClick={()=>doSilver(true)}>跳过，完成银牌计划</button>
  </div></div>);
  if(step===4){const isLast=bzStep===4;return(<div className="overlay"><div className="modal-box modal-bronze">
    <StepDots cur={3} total={4}/>
    <div className="modal-title">🥉 还需要做的事 ({bzStep+1}/5)</div>
    <div className="modal-hint">这些是今日待办，完成更好，完不成也不要紧。</div>
    <div className="form-group"><label className="form-label">任务名称（可跳过）</label>
      <input className="form-input" placeholder={`第 ${bzStep+1} 件待办…`} value={curIn} onChange={e=>setCurIn(e.target.value)} onKeyDown={e=>!isLast&&e.key==='Enter'&&curIn.trim()&&doBronze(false)} maxLength={100} autoFocus/></div>
    <div className="form-group"><label className="form-label">预计用时</label><TimePicker value={curT} onChange={setCurT} tier="bronze" isCheckIn={curIsCheckIn} onCheckInChange={setCurIsCheckIn}/></div>
    {isLast?<button className="btn btn-bronze" disabled={!curIn.trim()} onClick={()=>doBronze(false)}>完成今日计划 🎯</button>
           :<button className="btn btn-bronze" disabled={!curIn.trim()} onClick={()=>doBronze(false)}>确定 →</button>}
    <button className="btn btn-ghost" onClick={()=>doBronze(true)}>跳过，完成铜牌计划 🎯</button>
  </div></div>);}
  return null;
}

// ── POMODORO TIMER ───────────────────────────────────
function PomodoroTimer({task,onComplete,onPause}){
  const tier=task.tier;
  const [phase,setPhase]=useState('running');
  const [addMin,setAddMin]=useState(15);
  const [pauses,setPauses]=useState(0);
  const ivRef=useRef(null);
  const startWallRef=useRef(task.timerStartedAt||new Date().toISOString());

  // ── Wall-clock epoch ──────────────────────────────
  // Instead of counting ticks, we record a reference point and compute
  // elapsed time from Date.now(). This survives mobile background throttling.
  const initialTotal = task.estimatedMinutes * 60;
  const priorSecs = task.remainingSeconds != null
    ? Math.max(0, initialTotal - task.remainingSeconds) : 0;
  const epochRef = useRef({ startMs: Date.now(), priorSecs, totalSecs: initialTotal });

  const computeDisplay = useCallback(() => {
    const e = epochRef.current;
    const elapsed = e.priorSecs + Math.floor((Date.now() - e.startMs) / 1000);
    const tLeft   = Math.max(0, e.totalSecs - elapsed);
    const isOv    = elapsed >= e.totalSecs;
    const ovTime  = isOv ? elapsed - e.totalSecs : 0;
    return { tLeft, isOv, ovTime, elapsed };
  }, []);

  const [disp, setDisp] = useState(computeDisplay);
  const beepedRef = useRef(false); // beep fires once when overtime begins

  const startTicking = useCallback(() => {
    clearInterval(ivRef.current);
    ivRef.current = setInterval(() => {
      const d = computeDisplay();
      setDisp(d);
      if(d.isOv && !beepedRef.current){ beepedRef.current=true; playBeep(); haptic([80]); }
    }, 500);
  }, [computeDisplay]);

  // Sound & haptic driven purely by phase transitions — single source of truth
  useEffect(() => {
    if(phase === 'evaluate') { playChime(); haptic([150,80,150]); }
    if(phase === 'success')  { playSuccess(); haptic([80,50,80,50,200]); }
  }, [phase]);

  // Start ticking on mount
  useEffect(() => { startTicking(); return () => clearInterval(ivRef.current); }, []);

  // Page Visibility API: refresh immediately when user returns to foreground
  useEffect(() => {
    const onVisible = () => {
      if(document.hidden) return;
      const d = computeDisplay();
      setDisp(d);
      if(d.isOv && !beepedRef.current){ beepedRef.current=true; playBeep(); haptic([80]); }
    };
    document.addEventListener('visibilitychange', onVisible);
    return () => document.removeEventListener('visibilitychange', onVisible);
  }, [computeDisplay]);

  const earlyDone = () => { clearInterval(ivRef.current); setPhase('confirmEarly'); };

  const confirmDone = () => {
    clearInterval(ivRef.current);
    const d = computeDisplay();
    const actual = d.isOv
      ? Math.ceil(epochRef.current.totalSecs / 60) + Math.ceil(d.ovTime / 60)
      : Math.max(1, Math.ceil(d.elapsed / 60));
    setPhase('success');
    setTimeout(() => onComplete({
      ...task, actualMinutes: actual, pauseCount: pauses,
      status: 'completed',
      timerStartedAt: startWallRef.current,
      completedAt: new Date().toISOString(),
    }), 1800);
  };

  const handleAddTime = () => {
    const d = computeDisplay();
    // Extend: anchor a new epoch so elapsed resets relative to now,
    // but with enough totalSecs to add the chosen minutes on top of elapsed
    epochRef.current = {
      startMs:   Date.now(),
      priorSecs: d.elapsed,
      totalSecs: d.elapsed + addMin * 60,
    };
    setDisp(computeDisplay());
    setPhase('running');
    setPauses(p => p + 1);
    startTicking();
  };

  const handlePause = () => {
    clearInterval(ivRef.current);
    const d = computeDisplay();
    onPause(task, d.isOv ? 0 : d.tLeft);
  };

  const { tLeft, isOv, ovTime } = disp;
  const progress = isOv ? 0 : (tLeft / epochRef.current.totalSecs) * 100;

  if(phase==='success') return(<div className="timer-overlay"><div className="success-splash">
    <span className="success-emoji">🎉</span>
    <div className="success-title">任务完成！</div>
    <div className="success-sub">{tier==='gold'?'🥇 金牌任务拿下！太棒了！':tier==='silver'?'🥈 银牌任务完成！':'🥉 铜牌任务完成！'}</div>
  </div></div>);

  if(phase==='confirmEarly') return(<div className="timer-overlay"><div className="dialog-box">
    <div className="dialog-emoji">⚡</div>
    <div className="dialog-title">确认完成任务？</div>
    <div className="dialog-sub">{isOv?`已超时 ${Math.floor(ovTime/60)}分${ovTime%60}秒，确认标记为完成？`:`距计划还剩 ${fmt(tLeft)}，确认提前完成？`}</div>
    <div className="dialog-row">
      <button className="dialog-btn dialog-yes" onClick={confirmDone}>✅ 确认完成</button>
      <button className="dialog-btn dialog-no"  onClick={()=>{startTicking();setPhase('running');}}>继续计时</button>
    </div>
    {!isOv&&<button className="dialog-cancel" onClick={()=>setPhase('addTime')}>➕ 加时后继续</button>}
  </div></div>);

  if(phase==='evaluate') return(<div className="timer-overlay"><div className="dialog-box">
    <div className="dialog-emoji">🤔</div>
    <div className="dialog-title">任务完成了吗？</div>
    <div className="dialog-sub">{isOv?`已超时 ${Math.floor(ovTime/60)}分${ovTime%60}秒`:`提前完成，剩余 ${fmt(tLeft)}`}</div>
    <div className="dialog-row">
      <button className="dialog-btn dialog-yes" onClick={confirmDone}>✅ 完成了</button>
      <button className="dialog-btn dialog-no"  onClick={()=>setPhase('addTime')}>➕ 加时</button>
    </div>
    <button className="dialog-cancel" onClick={()=>onPause(task,0)}>取消，回到主界面</button>
  </div></div>);

  if(phase==='addTime') return(<div className="timer-overlay"><div className="dialog-box">
    <div className="dialog-emoji">⏰</div>
    <div className="dialog-title">增加时间</div>
    <div className="dialog-sub">继续为该任务追加计时</div>
    <div className="time-chips" style={{justifyContent:'center',marginBottom:16}}>
      {[10,15,25,30,45].map(t=>(<button key={t} className={`time-chip${addMin===t?' chip-gold':''}`} onClick={()=>setAddMin(t)}>+{t}分钟</button>))}
    </div>
    <button className="dialog-btn dialog-yes" style={{width:'100%',padding:12,marginBottom:9}} onClick={handleAddTime}>继续计时</button>
    <button className="dialog-cancel" onClick={()=>onPause(task,0)}>放弃，回到主界面</button>
  </div></div>);

  return(<div className="timer-overlay"><div className={`timer-card timer-${tier}`}>
    <div className="timer-tier-label">{tier==='gold'?'🥇 金牌任务':tier==='silver'?'🥈 银牌任务':'🥉 铜牌任务'}</div>
    <div className="timer-task-name">{task.title}</div>
    <div className={`timer-digits ${isOv?'digits-overtime':'digits-normal'}`}>{isOv?`+${fmt(ovTime)}`:fmt(tLeft)}</div>
    {!isOv&&<div className="timer-prog-wrap"><div className="timer-prog-bar" style={{width:`${progress}%`}}/></div>}
    <div className={`timer-status${isOv?' overtime':''}`}>{isOv?'⚠️ 超时记录中 — 点击标记完成即可结束':`预计 ${task.estimatedMinutes} 分钟 · 专注进行中…`}</div>
    {pauses>0&&<div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:8}}>已加时 {pauses} 次</div>}
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <button className="btn btn-green" onClick={earlyDone}>✅ {isOv?'标记完成':'提前完成'}</button>
      <button className="btn btn-ghost" onClick={handlePause}>← 暂停，回到主界面</button>
    </div>
  </div></div>);
}

// ── ADD TASK MODAL ───────────────────────────────────
function AddTaskModal({onSave,onClose,plan}){
  const goldFull  = plan && !!plan.goldTask;
  const silverFull= plan && (plan.silverTasks||[]).length >= 3;
  const bronzeFull = plan && (plan.bronzeTasks||[]).length >= 5;
  const isFull = t=>(t==='gold'&&goldFull)||(t==='silver'&&silverFull)||(t==='bronze'&&bronzeFull);
  const TIER_LABEL={gold:'金牌',silver:'银牌',bronze:'铜牌'};
  const TIER_LIMIT={gold:1,silver:3,bronze:5};
  const defaultTier= goldFull ? (silverFull ? (bronzeFull?'gold':'bronze') : 'silver') : 'gold';
  const [tier,setTier]=useState(defaultTier);
  const [title,setTitle]=useState('');
  const [time,setTime]=useState(25);
  const [isCI,setIsCI]=useState(false);
  const [toastMsg,setToastMsg]=useState('');
  const [showOverride,setShowOverride]=useState(false);
  const tierFull=isFull(tier);
  const mkTask=()=>({id:genId(),title:title.trim(),estimatedMinutes:isCI?0:time,tier,status:'idle',actualMinutes:null,pauseCount:0,timerStartedAt:null,completedAt:null,remainingSeconds:null,isCheckIn:isCI});
  const canSave=!!(title.trim());
  const handleTierClick=t=>{
    setTier(t);
    if(isFull(t)){
      setToastMsg(`1·3·5 效率法建议${TIER_LABEL[t]}任务仅设置 ${TIER_LIMIT[t]} 个，过多会分散注意力哦`);
      setTimeout(()=>setToastMsg(''),3000);
    } else { setToastMsg(''); }
  };
  const handleSave=()=>{
    if(!canSave) return;
    if(tierFull){ setShowOverride(true); return; }
    onSave(mkTask());
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal-box modal-welcome" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:3,color:'var(--text-primary)'}}>➕ 新增任务</div>
        <div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:14}}>为今日计划补充任务</div>
        {toastMsg&&<div className="toast-inline">💡 {toastMsg}</div>}
        <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:6}}>任务类别</label>
        <div className="tier-btn-row">
          <button className={`tier-btn${tier==='gold'?' active-gold':''}${goldFull?' tier-full':''}`} onClick={()=>handleTierClick('gold')}>🥇 金牌{goldFull?' ✓':''}</button>
          <button className={`tier-btn${tier==='silver'?' active-silver':''}${silverFull?' tier-full':''}`} onClick={()=>handleTierClick('silver')}>🥈 银牌{silverFull?' 3/3':''}</button>
          <button className={`tier-btn${tier==='bronze'?' active-bronze':''}${bronzeFull?' tier-full':''}`} onClick={()=>handleTierClick('bronze')}>🥉 铜牌{bronzeFull?' 5/5':''}</button>
        </div>
        <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:6}}>任务名称</label>
        <input className="plan-input" value={title} onChange={e=>setTitle(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&canSave) handleSave();}}
          placeholder="任务内容…" maxLength={100} autoFocus style={{width:'100%',marginBottom:14,boxSizing:'border-box'}}/>
        <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:8}}>预计用时</label>
        <TimePicker value={time} onChange={setTime} tier={tier} isCheckIn={isCI} onCheckInChange={setIsCI}/>
        <div style={{display:'flex',gap:8,marginTop:16}}>
          <button className="btn btn-green" style={{flex:1,opacity:tierFull?.6:1,transition:'opacity .2s'}} disabled={!canSave} onClick={handleSave}>
            {tierFull?'⚠️ 超限添加':'✅ 添加'}
          </button>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>取消</button>
        </div>
        {showOverride&&(
          <div className="overlay" onClick={()=>setShowOverride(false)}>
            <div className="dialog-box" onClick={e=>e.stopPropagation()}>
              <div className="dialog-emoji">💡</div>
              <div className="dialog-title">超出建议数量</div>
              <div className="dialog-sub">1·3·5 效率法建议{TIER_LABEL[tier]}任务仅设置 {TIER_LIMIT[tier]} 个，过多容易分散注意力。<br/><br/>仍然确认添加吗？</div>
              <div className="dialog-row">
                <button className="dialog-btn" style={{background:'rgba(255,160,0,.12)',color:'var(--gold)',border:'1px solid rgba(255,160,0,.3)'}} onClick={()=>{setShowOverride(false);onSave(mkTask());}}>坚持添加</button>
                <button className="dialog-btn dialog-no" onClick={()=>setShowOverride(false)}>取消</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

        <div style={{display:'flex',gap:8,marginTop:16}}>
          <button className="btn btn-green" style={{flex:1}} onClick={handleSave}>✅ 保存</button>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>取消</button>
        </div>
      </div>
    </div>
  );
}

// ── TASK CARD ────────────────────────────────────────
function TaskCard({task,locked,onStart,onEdit,onDelete,onUndoComplete,onQuickSave}){
  const done=task.status==='completed';
  const tier=task.tier;
  const tierEmoji = tier==='gold'?'🥇':tier==='silver'?'🥈':'🥉';

  if(done){
    const stampClass=`done-stamp done-stamp-${tier}`;
    return(
      <div className={`task-card task-card-${tier} done-card`}>
        <div className="card-inner">
          <div className="card-top">
            <div className="card-title" style={{textDecoration:'line-through',opacity:.65}}>
              <span style={{marginRight:5}}>{tierEmoji}</span>{task.title}
            </div>
            <span className={`card-badge badge-${tier}`}>✅</span>
          </div>
          <div className="card-meta">
            {task.actualMinutes>0&&<span>用时 {task.actualMinutes}min</span>}
            <span className="card-btn-group">
              {onUndoComplete&&<button className="card-edit-btn" onClick={e=>{e.stopPropagation();onUndoComplete(task);}} title="撤销完成">↩️</button>}
              {onDelete&&<button className="card-edit-btn" onClick={e=>{e.stopPropagation();onDelete(task);}} title="删除任务" style={{color:'var(--danger)'}}>🗑️</button>}
            </span>
          </div>
          <div className={stampClass}>DONE</div>
        </div>
      </div>
    );
  }

  const isPaused = task.status==='paused';
  const isCI = !!task.isCheckIn;
  const remainMins = isPaused && task.remainingSeconds!=null ? Math.ceil(task.remainingSeconds/60) : null;
  // ── 内联编辑状态 ──
  const [isInlineEdit,setIsInlineEdit]=useState(false);
  const [editVal,setEditVal]=useState('');
  const inlineRef=useRef(null);
  const longPressTimer=useRef(null);

  useEffect(()=>{ if(isInlineEdit&&inlineRef.current) inlineRef.current.focus(); },[isInlineEdit]);

  const startInlineEdit=e=>{
    if(locked||!onQuickSave) return;
    e.stopPropagation();
    setEditVal(task.title);
    setIsInlineEdit(true);
  };
  const saveInlineEdit=()=>{
    const v=editVal.trim();
    if(v&&v!==task.title&&onQuickSave) onQuickSave({...task,title:v});
    setIsInlineEdit(false);
  };
  const cancelInlineEdit=()=>setIsInlineEdit(false);
  // 长按 (移动端)
  const handleTouchStart=()=>{
    if(locked||!onQuickSave) return;
    longPressTimer.current=setTimeout(()=>{ setEditVal(task.title); setIsInlineEdit(true); },600);
  };
  const handleTouchEnd=()=>clearTimeout(longPressTimer.current);

  const handleClick=()=>{ if(locked||isInlineEdit) return; onStart(task); };
  return(
    <div className={`task-card task-card-${tier}${locked?' locked':''}`} onClick={handleClick}
         onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} onTouchMove={handleTouchEnd}>
      <div className="card-inner">
        <div className="card-top">
          {isInlineEdit?(
            <div className="inline-edit-wrap">
              <input ref={inlineRef} className="inline-edit-input" value={editVal} maxLength={100}
                onChange={e=>setEditVal(e.target.value)}
                onBlur={saveInlineEdit}
                onClick={e=>e.stopPropagation()}
                onKeyDown={e=>{ e.stopPropagation(); if(e.key==='Enter') saveInlineEdit(); if(e.key==='Escape') cancelInlineEdit(); }}/>
            </div>
          ):(
            <div className={`card-title title-expanded`}
                 onDoubleClick={startInlineEdit}
                 title={'双击编辑标题·长按编辑'}>
              <span style={{marginRight:5}}>{tierEmoji}</span>{task.title}
            </div>
          )}
          <span className={`card-badge badge-${tier}`}>{locked?'🔒':isCI?'✓ 打卡':isPaused?'⏸ 继续':'▶ 开始'}</span>
        </div>
        <div className="card-meta">
          {isCI
            ? <span>点击即完成，无需计时</span>
            : isPaused && remainMins!=null
              ? <span>⏸ 剩余约 {remainMins} 分钟</span>
              : <span>⏱ {task.estimatedMinutes}分钟</span>
          }
          {!locked&&(onEdit||onDelete)&&(
            <span className="card-btn-group">
              {onEdit&&<button className="card-edit-btn" onClick={e=>{e.stopPropagation();onEdit(task);}} title="编辑任务">✏️</button>}
              {onDelete&&<button className="card-edit-btn" onClick={e=>{e.stopPropagation();onDelete(task);}} title="删除任务" style={{color:'var(--danger)'}}>🗑️</button>}
            </span>
          )}
        </div>
      </div>
    </div>
  );
}
