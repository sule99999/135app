// ── CALENDAR VIEW ────────────────────────────────────
function CalendarView({plans, events, onAddEvent, onDeleteEvent}){
  const [view,setView]=useState('month');
  const [curYear,setCurYear]=useState(new Date().getFullYear());
  const [curMonth,setCurMonth]=useState(new Date().getMonth());
  const [selDate,setSelDate]=useState(todayStr());
  const [showAdd,setShowAdd]=useState(false);

  const today=todayStr();

  // Navigate months
  const prevMonth=()=>{ if(curMonth===0){setCurYear(y=>y-1);setCurMonth(11);}else setCurMonth(m=>m-1); };
  const nextMonth=()=>{ if(curMonth===11){setCurYear(y=>y+1);setCurMonth(0);}else setCurMonth(m=>m+1); };
  const goToday=()=>{ const n=new Date(); setCurYear(n.getFullYear()); setCurMonth(n.getMonth()); setSelDate(todayStr()); };

  // Navigate days (in day view)
  const shiftDay=(delta)=>{
    const d=new Date(selDate+'T12:00:00');
    d.setDate(d.getDate()+delta);
    setSelDate(d.toISOString().split('T')[0]);
  };

  // Build month grid
  const monthGrid=useMemo(()=>{
    const firstDay=new Date(curYear,curMonth,1).getDay();
    const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
    const startOffset=firstDay===0?6:firstDay-1; // Monday start
    const cells=[];
    // Previous month days
    const prevDays=new Date(curYear,curMonth,0).getDate();
    for(let i=startOffset-1;i>=0;i--){
      const d=new Date(curYear,curMonth-1,prevDays-i);
      cells.push({date:d.toISOString().split('T')[0],inMonth:false});
    }
    // Current month
    for(let d=1;d<=daysInMonth;d++){
      const dt=new Date(curYear,curMonth,d);
      cells.push({date:dt.toISOString().split('T')[0],inMonth:true});
    }
    // Next month fill
    while(cells.length%7!==0){
      const d=new Date(curYear,curMonth+1,cells.length-daysInMonth-startOffset+1);
      cells.push({date:d.toISOString().split('T')[0],inMonth:false});
    }
    return cells;
  },[curYear,curMonth]);

  const MONTH_NAMES=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const DAY_LABELS=['一','二','三','四','五','六','日'];

  // Timeline for selected date
  const timelineEvts=useMemo(()=>getTimelineEvents(selDate,plans,events),[selDate,plans,events]);
  const alldayEvts=timelineEvts.filter(e=>e.allDay);
  const timedEvts=timelineEvts.filter(e=>!e.allDay);

  // Compute event positions (simple, no overlap detection)
  const HOUR_H=56;
  const evtBlocks=timedEvts.map(e=>{
    const startMin=e.startH*60+e.startM;
    const endMin=e.endH*60+e.endM;
    const dur=Math.max(endMin-startMin,20);
    return {...e, top:startMin*(HOUR_H/60), height:Math.max(dur*(HOUR_H/60),24)};
  });

  const MonthView=()=>(
    <div>
      <div className="cal-month-header">
        <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
        <div className="cal-month-title">{curYear}年 {MONTH_NAMES[curMonth]}</div>
        <button className="cal-today-btn" onClick={goToday}>今天</button>
        <button className="cal-nav-btn" onClick={nextMonth}>›</button>
      </div>
      <div className="cal-days-row">
        {DAY_LABELS.map(d=>(<div key={d} className="cal-day-label">{d}</div>))}
      </div>
      <div className="cal-grid">
        {monthGrid.map(cell=>{
          const dots=getDayDots(cell.date,plans,events);
          const isToday=cell.date===today;
          const isSel=cell.date===selDate;
          return(
            <div key={cell.date} className={`cal-cell${!cell.inMonth?' other-month':''}${isToday?' today':''}${isSel?' selected':''}`}
              onClick={()=>{setSelDate(cell.date);setView('day');}}>
              <div className="cal-date-num">
                {parseInt(cell.date.split('-')[2])}
              </div>
              {dots.length>0&&(
                <div className="cal-dots">
                  {dots.map((c,i)=>(<div key={i} className={`cal-dot ec-${c}`}/>))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );

  const DayView=()=>{
    const fmtHour=h=>h===0?'0:00':h<10?`${h}:00`:`${h}:00`;
    // Scroll to first event or 8am
    const scrollRef=useRef(null);
    useEffect(()=>{
      if(scrollRef.current){
        const firstEvt=timedEvts.length>0?Math.min(...timedEvts.map(e=>e.startH)):8;
        const scrollTo=Math.max(0,(firstEvt-1)*HOUR_H);
        scrollRef.current.scrollTop=scrollTo;
      }
    },[selDate]);

    return(
      <div>
        <div className="cal-day-header">
          <button className="cal-back-btn" onClick={()=>setView('month')}>‹ 月历</button>
          <div style={{display:'flex',alignItems:'center',gap:4,flex:1,justifyContent:'center'}}>
            <button className="cal-nav-btn" style={{fontSize:18}} onClick={()=>shiftDay(-1)}>‹</button>
            <div className="cal-day-title" style={{minWidth:100,textAlign:'center'}}>{fmtDateShort(selDate)}{selDate===today?' · 今天':''}</div>
            <button className="cal-nav-btn" style={{fontSize:18}} onClick={()=>shiftDay(1)}>›</button>
          </div>
          <button className="cal-add-btn" onClick={()=>setShowAdd(true)}>+ 添加</button>
        </div>

        {/* All-day events */}
        {alldayEvts.length>0&&(
          <div className="allday-strip">
            {alldayEvts.map(e=>(
              <div key={e.id} className="allday-chip" style={{background:getEvtColor(e.colorKey)}}
                onClick={()=>{if(!e.isTask&&confirm(`删除"${e.title}"?`)) onDeleteEvent(e.id);}}>
                {e.title}
              </div>
            ))}
          </div>
        )}

        {/* Timeline */}
        <div className="timeline-scroll" ref={scrollRef} style={{height:'calc(100vh - 240px)',overflowY:'auto'}}>
          <div className="timeline-inner" style={{height:`${24*HOUR_H}px`}}>
            {Array.from({length:24}).map((_,h)=>(
              <div key={h} className="hour-row" style={{height:`${HOUR_H}px`,top:`${h*HOUR_H}px`,position:'absolute',width:'100%',left:0}}>
                <span className="hour-label">{fmtHour(h)}</span>
                <div style={{position:'absolute',left:50,right:0,top:0,height:'1px',background:'var(--hour-line)'}}/>
              </div>
            ))}
            {evtBlocks.map(e=>(
              <div key={e.id} className="evt-block"
                style={{top:e.top,height:e.height,background:getEvtColor(e.colorKey),left:54,right:6}}
                onClick={()=>{if(!e.isTask&&confirm(`删除"${e.title}"?`)) onDeleteEvent(e.id);}}>
                <div className="evt-title">{e.isTask?{gold:'🥇',silver:'🥈',bronze:'🥉'}[e.tier]:''} {e.title}</div>
                {e.height>36&&<div className="evt-time">{String(e.startH).padStart(2,'0')}:{String(e.startM).padStart(2,'0')} – {String(e.endH).padStart(2,'0')}:{String(e.endM).padStart(2,'0')}</div>}
              </div>
            ))}
            {timelineEvts.length===0&&(
              <div className="day-empty" style={{position:'absolute',top:'30%',left:0,right:0}}>
                <div className="day-empty-icon">📭</div>
                <div style={{fontSize:13,color:'var(--text-secondary)'}}>今天还没有任何记录<br/>点击右上角"+ 添加"可添加事件</div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  return(
    <div className="cal-wrap">
      {view==='month'?<MonthView/>:<DayView/>}
      {showAdd&&<AddEventModal initialDate={selDate} onSave={onAddEvent} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

// ── ROOT APP ─────────────────────────────────────────
function App(){
  const [first,    setFirst]    = useLS(SK.FIRST, null);
  const [plans,    setPlans]    = useLS(SK.PLANS, {});
  const [theme,    setTheme]    = useLS(SK.THEME, 'white');
  const [events,   setEvents]   = useLS(SK.EVENTS, {});
  const [soundEnabled, setSoundEnabled] = useLS(SK.SOUND, true);
  const [welcomed,   setWelcomed]   = useLS(SK.WELCOMED, false);
  // activeDate tracks the last day the user officially set up a plan.
  // When activeDate !== today, the planning modal shows — NO data is ever deleted.
  const [activeDate, setActiveDate] = useLS(SK.ACTIVE_DATE, null);
  const [view,         setView]         = useState('dash');
  const [showTheme,    setShowTheme]    = useState(false);
  // Compute today fresh every render — never stale, immune to state init bugs
  const today = todayStr();
  // Force re-render every 30s and on visibilitychange so midnight is caught immediately
  const [, _tick] = useState(0);
  useEffect(()=>{
    const bump=()=>_tick(n=>n+1);
    const iv=setInterval(bump,30000);
    const onVis=()=>{ if(!document.hidden) bump(); };
    document.addEventListener('visibilitychange',onVis);
    return ()=>{ clearInterval(iv); document.removeEventListener('visibilitychange',onVis); };
  },[]);
  // Auto day-reset: set a precise timeout to fire exactly at midnight
  // When it fires, the re-render recalculates today → plan becomes null → DailyPlanModal shows
  useEffect(()=>{
    const now=new Date();
    const nextMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
    const msUntilMidnight=nextMidnight.getTime()-now.getTime();
    const t=setTimeout(()=>_tick(n=>n+1), msUntilMidnight+500);
    return ()=>clearTimeout(t);
  },[today]);

  useEffect(()=>{ if(!first) setFirst(today); },[]);

  // Global click sound — fires on every non-disabled interactive element
  useEffect(()=>{
    const handler=e=>{
      const btn=e.target.closest('button');
      if(btn&&!btn.disabled){ playClick(); return; }
      // Non-button interactive elements
      if(e.target.closest('.task-card:not(.locked),.cal-day-cell,.theme-opt,.cal-month-header')) playClick();
    };
    document.addEventListener('click',handler,true);
    return ()=>document.removeEventListener('click',handler,true);
  },[]);
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    // Keep PWA theme-color in sync with current theme
    const themeColors={white:'#ffffff',cream:'#faf8f3',lavender:'#f3f0fa',green:'#f0f7f0',blue:'#f0f5ff',pink:'#fff0f5',dark:'#090912'};
    const meta=document.getElementById('theme-color-meta');
    if(meta) meta.content=themeColors[theme]||'#ffffff';
  },[theme]);

  const dc    = React.useMemo(()=>{
    const keys=Object.keys(plans).sort();
    return dayCount(keys.length>0 ? keys[0] : (first||today));
  },[plans,first,today]);
  // Plan is valid only when user has officially activated today via the planning modal.
  // Historical plans are NEVER deleted — they stay in `plans` for calendar & review.
  const plan  = activeDate === today ? (plans[today] || null) : null;
  const streak= useMemo(()=>calcStreak(plans),[plans]);

  const savePlan=p=>{ setPlans(prev=>({...prev,[today]:p})); setActiveDate(today); };
  const updateTask=t=>setPlans(prev=>{
    const p={...prev[today]};
    if(t.tier==='gold') p.goldTask=t;
    else if(t.tier==='silver') p.silverTasks=p.silverTasks.map(x=>x.id===t.id?t:x);
    else p.bronzeTasks=p.bronzeTasks.map(x=>x.id===t.id?t:x);
    return {...prev,[today]:p};
  });
  const addEvent=e=>setEvents(prev=>({...prev,[e.id]:e}));
  const delEvent=id=>setEvents(prev=>{ const n={...prev}; delete n[id]; return n; });
  const addTask=t=>setPlans(prev=>{
    const p={...(prev[today]||{})};
    if(t.tier==='gold') p.goldTask=t;
    else if(t.tier==='silver') p.silverTasks=[...(p.silverTasks||[]),t];
    else p.bronzeTasks=[...(p.bronzeTasks||[]),t];
    return {...prev,[today]:p};
  });
  const deleteTask=t=>setPlans(prev=>{
    const p={...(prev[today]||{})};
    if(t.tier==='gold') p.goldTask=null;
    else if(t.tier==='silver') p.silverTasks=(p.silverTasks||[]).filter(x=>x.id!==t.id);
    else p.bronzeTasks=(p.bronzeTasks||[]).filter(x=>x.id!==t.id);
    return {...prev,[today]:p};
  });

  return(
    <div id="app-root">
      <div className="app-header">
        <div className="header-left">
          <div className="app-header-title">1·3·5 效率系统</div>
          <div className="app-header-meta">
            <span>{fmtDate(today)}</span>
            <span>第 {dc} 天</span>
            {streak>0&&<span className="streak-chip">🔥 {streak}天连击</span>}
          </div>
        </div>
        <button className="settings-btn" onClick={()=>setShowTheme(true)} title="选择主题">🎨</button>
      </div>

      {view==='dash'     &&plan &&<Dashboard plan={plan} onUpdate={updateTask} onAddTask={addTask} onDeleteTask={deleteTask}/>}
      {view==='cal'            &&<CalendarView plans={plans} events={events} onAddEvent={addEvent} onDeleteEvent={delEvent}/>}
      {view==='review'         &&<DataReview plans={plans}/>}
      {view==='settings'       &&<SettingsPanel soundEnabled={soundEnabled} onSoundChange={setSoundEnabled}/>}
      {!welcomed&&<WelcomeModal onStart={()=>setWelcomed(true)}/>}
      {welcomed&&!plan&&<DailyPlanModal onDone={savePlan} dayN={dc} today={today}/>}
      {showTheme&&<ThemePanel current={theme} onChange={setTheme} onClose={()=>setShowTheme(false)}/>}

      <div className="bottom-nav">
        <button className={`nav-btn${view==='dash'?' active':''}`} onClick={()=>setView('dash')}>
          <span className="nav-icon">📋</span>今日任务
        </button>
        <button className={`nav-btn${view==='cal'?' active':''}`} onClick={()=>setView('cal')}>
          <span className="nav-icon">📅</span>日历
        </button>
        <button className={`nav-btn${view==='review'?' active':''}`} onClick={()=>setView('review')}>
          <span className="nav-icon">📊</span>数据复盘
        </button>
        <button className={`nav-btn${view==='settings'?' active':''}`} onClick={()=>setView('settings')}>
          <span className="nav-icon">⚙️</span>设置
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
// 注册 Service Worker（支持离线使用和"添加到主屏幕"）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
